<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>産連調査Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <style>
        /* ============================================================
           Phase 7: Design Tokens
           ============================================================ */
        :root {
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Noto Sans JP', sans-serif;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,.04), 0 0 0 1px rgba(0,0,0,.03);
            --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.03);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.02);
            --shadow-lg: 0 16px 48px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
            --sidebar-width: 240px;
            --primary-50:#F0F4F8;--primary-100:#D9E2EC;--primary-200:#BCCCDC;--primary-400:#627D98;--primary-600:#334E68;--primary-900:#102A43;--primary-1200:#0A1929;
            --orange-500:#FB5B01;--green-600:#259D63;--cyan-600:#00A3BF;
            --red-600:#C53030;--red-50:#FFF5F5;
            /* Category semantic colors */
            --cat-kyodo:#2563EB;--cat-jutaku:#0891B2;--cat-chiken:#7C3AED;--cat-hatsu:#C2410C;--cat-chizai:#0D9488;--cat-tokkyo:#4F46E5;--cat-venture:#DC2626;--cat-kifu:#059669;
            --cat-kyodo-fill:rgba(37,99,235,.08);--cat-jutaku-fill:rgba(8,145,178,.08);--cat-chiken-fill:rgba(124,58,237,.08);--cat-hatsu-fill:rgba(194,65,12,.08);--cat-chizai-fill:rgba(13,148,136,.08);--cat-tokkyo-fill:rgba(79,70,229,.08);--cat-venture-fill:rgba(220,38,38,.08);--cat-kifu-fill:rgba(5,150,105,.08);
            --accent-vermillion:#C84B31;
            --signal-pos:#0E7C3A;--signal-neg:#C53030;--signal-neu:#718096;
        }

        /* Phase 1: Light theme — 紺藍ベース */
        [data-theme="light"] {
            --bg: #F7F8FC; --card: #FFFFFF; --card-hover: #FAFBFF;
            --text: #1A202C; --text-2: #4A5568; --text-3: #718096;
            --border: #D9E2EC; --border-2: #F0F4F8;
            --sidebar-bg: #FFFFFF; --sidebar-text: #4A5568; --sidebar-active: #102A43; --sidebar-border: #D9E2EC;
            --sidebar-active-bg: var(--primary-50); --sidebar-active-text: var(--primary-900); --sidebar-active-border: var(--primary-600);
            --chart-line: #334E68; --chart-line-fill-top: rgba(51,78,104,.12); --chart-line-fill-bottom: rgba(51,78,104,.01);
            --chart-grid: #F0F1F5; --chart-text: #4A5568;
            --input-bg: #fff; --badge-bg: rgba(255,255,255,.12);
            --kpi-fill: rgba(16,42,67,.06);
            --badge-pos-text: #0E7C3A; --badge-pos-bg: #F0FFF4;
            --badge-neg-text: #C53030; --badge-neg-bg: #FFF5F5;
            --badge-neu-text: #718096; --badge-neu-bg: #F0F4F8;
        }

        /* Phase 1: Dark theme — 紺藍ベース */
        [data-theme="dark"] {
            --bg: #0F1117; --card: #1C2030; --card-hover: #252A3A;
            --text: #EAEDF2; --text-2: #8B92A0; --text-3: #718096;
            --border: #2A3040; --border-2: #1E2333;
            --sidebar-bg: #13161E; --sidebar-text: #8B92A0; --sidebar-active: #EAEDF2; --sidebar-border: #2A3040;
            --sidebar-active-bg: rgba(96,165,250,.12); --sidebar-active-text: #fff; --sidebar-active-border: #60A5FA;
            --chart-line: #60A5FA; --chart-line-fill-top: rgba(96,165,250,.20); --chart-line-fill-bottom: rgba(96,165,250,.02);
            --chart-grid: #2A3040; --chart-text: #8B92A0;
            --input-bg: #1E2333; --badge-bg: rgba(255,255,255,.06);
            --kpi-fill: rgba(96,165,250,.12);
            --primary-50: #1A2332; --primary-100: #233044; --primary-200: #2D3F56;
            --red-50: #3B1520;
            --badge-pos-text: #68D391; --badge-pos-bg: #1C3829;
            --badge-neg-text: #FCA5A5; --badge-neg-bg: #4C1D1D;
            --badge-neu-text: #8B92A0; --badge-neu-bg: #2A3040;
            /* Category colors dark */
            --cat-kyodo:#60A5FA;--cat-jutaku:#22D3EE;--cat-chiken:#A78BFA;--cat-hatsu:#FB923C;--cat-chizai:#2DD4BF;--cat-tokkyo:#818CF8;--cat-venture:#F87171;--cat-kifu:#34D399;
            --cat-kyodo-fill:rgba(96,165,250,.12);--cat-jutaku-fill:rgba(34,211,238,.12);--cat-chiken-fill:rgba(167,139,250,.12);--cat-hatsu-fill:rgba(251,146,60,.12);--cat-chizai-fill:rgba(45,212,191,.12);--cat-tokkyo-fill:rgba(129,140,248,.12);--cat-venture-fill:rgba(248,113,113,.12);--cat-kifu-fill:rgba(52,211,153,.12);
        }

        /* ============================================================
           Reset & Base (Phase 3: Typography)
           ============================================================ */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(37,99,235,.03),transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(5,150,105,.02),transparent 50%);pointer-events:none;z-index:0}
        [data-theme="dark"] body::before{background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(96,165,250,.04),transparent 60%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(52,211,153,.03),transparent 50%)}
        html{scroll-behavior:smooth}
        body{height:100%;font-family:var(--font-body);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;transition:background .3s,color .3s;overflow-x:hidden}
        #root{min-height:100vh}
        .app{display:flex;min-height:100vh}

        /* ============================================================
           Phase 4: Animations
           ============================================================ */
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .anim-in{animation:fadeIn .4s ease-out both}
        .anim-delay-1{animation-delay:.05s}.anim-delay-2{animation-delay:.1s}.anim-delay-3{animation-delay:.15s}.anim-delay-4{animation-delay:.2s}.anim-delay-5{animation-delay:.25s}

        /* ============================================================
           Sidebar
           ============================================================ */
        .sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .3s,background .3s,color .3s;border-right:1px solid var(--sidebar-border)}
        .sidebar-header{padding:24px 24px 20px;border-bottom:1px solid var(--sidebar-border)}
        .sidebar-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--sidebar-active);letter-spacing:-.01em;line-height:1.4}
        .sidebar-subtitle{font-size:12px;color:var(--sidebar-text);margin-top:6px}
        .sidebar-nav{padding:12px 0;flex:1;overflow-y:auto}
        .sidebar-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--sidebar-text);transition:all .15s;border-left:3px solid transparent;gap:8px}
        .sidebar-item:hover{background:var(--card-hover);color:var(--sidebar-active)}
        .sidebar-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active-text);border-left-color:var(--sidebar-active-border);font-weight:600}
        .sidebar-sep{height:1px;background:var(--sidebar-border);margin:10px 24px}
        .sidebar-badge{font-size:10px;background:var(--border-2);padding:2px 8px;border-radius:var(--radius-sm);margin-left:auto;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2)}
        .sidebar-footer{padding:20px 24px;border-top:1px solid var(--sidebar-border);font-size:11px;color:var(--text-3)}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40}

        /* サイドバー折りたたみ (56pxアイコンモード) */
        .sidebar{transition:width 200ms cubic-bezier(0.4,0,0.2,1),transform .3s,background .3s;will-change:width;overflow:hidden}
        .sidebar-collapse-btn{background:none;border:none;color:var(--sidebar-text);cursor:pointer;padding:10px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;width:100%;border-top:1px solid var(--sidebar-border);transition:color .15s}
        .sidebar-collapse-btn:hover{color:var(--sidebar-active);background:var(--card-hover)}
        .sidebar-icon{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;overflow:visible}
        .sidebar-label{white-space:nowrap;overflow:hidden;transition:opacity 150ms ease,width 150ms ease}

        .sidebar.collapsed{width:56px;min-width:56px}
        .sidebar.collapsed .sidebar-header{padding:16px 8px;text-align:center}
        .sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-subtitle,.sidebar.collapsed .sidebar-footer,.sidebar.collapsed .sidebar-badge{display:none}
        .sidebar.collapsed .sidebar-item{justify-content:center;padding:10px 0;border-left:none;gap:0}
        .sidebar.collapsed .sidebar-label{opacity:0;width:0;padding:0;margin:0;overflow:hidden}
        .sidebar.collapsed .sidebar-sep{margin:8px 12px}
        /* CSS tooltip on hover when collapsed */
        .sidebar.collapsed .sidebar-item{position:relative}
        .sidebar.collapsed .sidebar-item::after{content:attr(data-tooltip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:var(--text);color:var(--bg);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 150ms ease;z-index:100}
        .sidebar.collapsed .sidebar-item:hover::after{opacity:1}

        .app.sidebar-collapsed .main-content{margin-left:56px}

        .menu-btn{background:none;border:none;color:var(--text-2);cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);display:flex;align-items:center}
        .menu-btn:hover{background:var(--border-2);color:var(--text)}

        /* パンくず */
        .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3)}
        .breadcrumb-sep{display:flex;align-items:center}
        .breadcrumb-current{color:var(--text);font-weight:600}

        @media(max-width:1023px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .sidebar-overlay.open{display:block}
            .main-content{margin-left:0!important}
        }

        /* ============================================================
           Main Layout
           ============================================================ */
        .main-content{flex:1;margin-left:var(--sidebar-width);display:flex;flex-direction:column;min-height:100vh;transition:margin .3s;min-width:0;overflow-x:hidden}
        .content{flex:1;padding:28px 48px 40px;max-width:840px;margin:0 auto;overflow:hidden;width:100%}
        @media(min-width:1400px){.content{max-width:960px}}
        @media(max-width:767px){.content{padding:16px 12px 32px}}

        /* Header */
        .page-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
        .page-header-left{display:flex;align-items:center;gap:14px}
        .page-title{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em}
        .page-meta{font-size:13px;color:var(--text-2)}
        .page-header-right{display:flex;align-items:center;gap:12px}
        .myuni-chip{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--primary-50);border:1px solid var(--primary-200);border-radius:var(--radius-full);font-size:13px;color:var(--badge-pos-text);cursor:pointer;font-weight:600;transition:all .15s}
        .myuni-chip:hover{box-shadow:var(--shadow-sm)}
        .myuni-chip-set{color:var(--text-3);border:1px dashed var(--border);background:transparent;font-weight:500}
        @media(max-width:767px){.page-header{padding:10px 12px}.page-title{font-size:20px}.myuni-chip{font-size:11px;padding:5px 10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.breadcrumb span:first-child,.breadcrumb .breadcrumb-sep{display:none}.page-header .cmd-k-btn{display:none}}

        /* Phase 1: Theme toggle */
        .theme-toggle{width:40px;height:40px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
        .theme-toggle:hover{background:var(--card-hover);box-shadow:var(--shadow-sm)}

        /* Context bar */
        .context-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:10px 16px;background:var(--primary-50);border-radius:var(--radius-md);font-size:13px;color:var(--badge-pos-text);font-weight:500}
        .context-bar .ctx-clear{cursor:pointer;margin-left:auto;text-decoration:underline;font-weight:400}

        /* Filters */
        .filter-bar{display:flex;align-items:flex-end;gap:20px;margin-bottom:24px;flex-wrap:wrap}
        .filter-group{display:flex;flex-direction:column;gap:5px}
        .filter-label{font-size:12px;color:var(--text-2);font-weight:600;letter-spacing:.02em}
        .filter-select,.filter-input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;font-family:var(--font-body);background:var(--input-bg);color:var(--text);min-width:0;width:100%;transition:border .15s}
        .filter-group{flex:1;min-width:100px}
        @media(max-width:767px){.filter-bar{gap:8px}.filter-group{flex:1 1 calc(50% - 4px);min-width:0}.filter-group.search-wrapper{flex:1 1 100%}}
        .filter-select:focus,.filter-input:focus{outline:none;border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-50)}
        .search-wrapper{position:relative}
        .autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:0 0 var(--radius-md) var(--radius-md);box-shadow:var(--shadow-lg);z-index:20;max-height:360px;overflow-y:auto}
        .ac-group-label{padding:8px 16px;font-size:11px;font-weight:700;color:var(--text-3);background:var(--border-2);letter-spacing:.05em}
        .autocomplete-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
        .autocomplete-item:hover{background:var(--card-hover)}
        .autocomplete-item-name{font-size:14px;font-weight:600}.autocomplete-item-meta{font-size:12px;color:var(--text-2)}
        .ac-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);background:var(--card);font-family:var(--font-body);font-weight:500;white-space:nowrap;transition:all .15s;color:var(--text)}
        .ac-btn:hover{background:var(--card-hover)}.ac-btn.primary{background:var(--primary-900);color:#fff;border-color:var(--primary-900)}.ac-btn.primary:hover{opacity:.9}

        /* ============================================================
           Phase 5: KPI Bento Grid
           ============================================================ */
        .kpi-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
        .kpi-card{flex:0 1 200px;min-width:0}
        @media(max-width:767px){.kpi-card{flex:0 1 calc(50% - 6px)}}

        .kpi-card{background:var(--card);border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-xs);border:1.5px solid transparent;position:relative;overflow:hidden}
        .kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);background:var(--card-hover)}
        .kpi-card.selected{border-color:var(--primary-900);box-shadow:0 0 0 3px var(--primary-100),var(--shadow-md)}
        .kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius-lg) 0 0 var(--radius-lg)}
        .kpi-card.signal-up::before{background:var(--signal-pos)}.kpi-card.signal-flat::before{background:var(--text-3)}.kpi-card.signal-down::before{background:var(--signal-neg)}
        .kpi-label{font-size:13px;color:var(--text-2);font-weight:600;margin-bottom:10px}
        .kpi-value{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
        .kpi-change{display:inline-flex;align-items:center;font-size:13px;font-weight:700;padding:3px 10px;border-radius:var(--radius-sm)}
        .kpi-change.positive{color:var(--badge-pos-text);background:var(--badge-pos-bg)}.kpi-change.negative{color:var(--badge-neg-text);background:var(--badge-neg-bg)}.kpi-change.neutral{color:var(--badge-neu-text);background:var(--badge-neu-bg)}
        .kpi-rank{display:block;font-size:12px;color:var(--text-2);margin-top:8px}.kpi-note{display:block;font-size:11px;color:var(--red-600);margin-top:4px}
        .kpi-chart{margin-top:8px;height:36px;width:100%}

        /* Detail panel */
        .detail-panel{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:28px;margin-bottom:28px;border-top:3px solid var(--primary-900);transition:background .3s}
        .detail-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.02em}
        .detail-meta{font-size:13px;color:var(--text-2);margin-left:12px}

        /* Charts */
        .charts-row{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:28px}.charts-row>*{min-width:0}
        @media(max-width:900px){.charts-row{grid-template-columns:1fr}}
        .chart-panel{background:var(--card);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-xs);transition:background .3s;overflow:hidden;min-width:0}.chart-panel.full{margin-bottom:28px}
        .chart-title{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
        .chart-subtitle{font-size:12px;color:var(--text-2);margin-bottom:18px}.chart-note{font-size:11px;color:var(--red-600);margin-bottom:10px}
        .chart-canvas-wrapper{position:relative;width:100%}.chart-canvas-wrapper.trend{height:300px}.chart-canvas-wrapper.small{height:260px}.chart-canvas-wrapper.radar{height:380px}
        @media(max-width:767px){.chart-canvas-wrapper.trend{height:220px}.chart-canvas-wrapper.small{height:200px}.chart-canvas-wrapper.radar{height:280px}}

        /* Table (shadcn/ui) */
        .table-panel{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);overflow:hidden;margin-bottom:28px;transition:background .3s}
        .table-toolbar{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .table-title{font-family:var(--font-display);font-size:17px;font-weight:700}.table-count{font-size:13px;color:var(--text-2)}
        .table-search{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;font-family:var(--font-body);width:220px;background:var(--input-bg);color:var(--text);transition:border .15s}
        .table-search:focus{outline:none;border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-50)}
        .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
        table{width:100%;border-collapse:collapse;font-size:14px;min-width:700px}
        thead{background:var(--border-2)}
        thead th{text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:var(--text-2);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
        thead th.numeric{text-align:right}
        tbody td{padding:12px 16px;border-bottom:1px solid var(--border-2);color:var(--text);font-variant-numeric:tabular-nums;transition:background .1s}
        tbody td.numeric{text-align:right;font-family:var(--font-display);font-weight:500}
        tbody tr:hover{background:var(--primary-50)}
        td.highlight{background:var(--primary-100);font-weight:700;color:var(--primary-900)}
        .pagination{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 24px;border-top:1px solid var(--border)}
        .pagination-btn{padding:6px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:13px;font-family:var(--font-body);font-weight:500;color:var(--text);transition:all .15s}
        .pagination-btn:disabled{opacity:.35;cursor:default}.pagination-btn:not(:disabled):hover{border-color:var(--primary-600);background:var(--primary-50)}
        .pagination-info{font-size:13px;color:var(--text-2)}

        /* Footer */
        .dashboard-footer{border-top:1px solid var(--border);padding:20px 40px;font-size:12px;color:var(--text-3);line-height:1.8;transition:background .3s,color .3s}
        .dashboard-footer a{color:var(--primary-900);text-decoration:none;font-weight:500}

        /* States */

function downloadCSV(universities,kpi,category){
    const h=["#","大学名","区分","都道府県",...YL].join(",");
    const rows=universities.map((u,i)=>{const v=u.kpis?.[kpi]||[];return[i+1,`"${u.name}"`,u.type,u.prefecture,...YL.map((_,j)=>v[j]??"")].join(",")});
    const csv="\uFEFF"+[h,...rows].join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`${category}_${kpiL(kpi)}.csv`;a.click();URL.revokeObjectURL(url);
}

// SmartSearch
function SmartSearch({onSelect,onSetMyUni,placeholder="大学名を入力...",showMyUniBtn=false,showSuggestions=true}){
    const[results,setResults]=useState([]);const[open,setOpen]=useState(false);const[query,setQuery]=useState("");const ref=useRef(null);const[sc,setSc]=useState({});
    const search=useCallback(async q=>{if(!q.trim()){setResults([]);return}try{const d=await api.universities({search:q,limit:8});setResults(d.universities||[])}catch{setResults([])}}, []);
    useEffect(()=>{if(!showSuggestions)return;const names=SUGGEST_GROUPS.flatMap(g=>g.names);Promise.all(names.map(n=>api.universities({search:n,limit:1}).then(d=>(d.universities||[])[0]).catch(()=>null))).then(unis=>{const c={};unis.forEach(u=>{if(u)c[u.name]=u});setSc(c)})},[showSuggestions]);
    const sel=(u,asMyUni)=>{
        // showMyUniBtnが有効なら、行クリックでもマイ大学に設定
        if((asMyUni||showMyUniBtn)&&onSetMyUni)onSetMyUni(u);
        else if(onSelect)onSelect(u);
        setOpen(false);setResults([]);setQuery("");if(ref.current)ref.current.value="";
    };
    return(<div className="search-wrapper" style={{width:"100%"}}><input ref={ref} type="text" className="filter-input" style={{width:"100%"}} placeholder={placeholder} onChange={e=>{setQuery(e.target.value);setOpen(true);if(e.target.value)search(e.target.value);else setResults([])}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),250)}/>
        {open&&!query&&showSuggestions&&Object.keys(sc).length>0&&<div className="autocomplete-dropdown">{SUGGEST_GROUPS.map(g=>{const unis=g.names.map(n=>sc[n]).filter(Boolean);if(!unis.length)return null;return(<div key={g.label}><div className="ac-group-label">{g.label}</div>{unis.map(u=>(<div key={u.code} className="autocomplete-item" onMouseDown={e=>e.preventDefault()} onClick={()=>sel(u,false)}><div><div className="autocomplete-item-name">{u.name}</div><div className="autocomplete-item-meta">{u.type}/{u.prefecture}</div></div>{showMyUniBtn&&<button className="ac-btn primary" onClick={e=>{e.stopPropagation();sel(u,true)}}>★ マイ大学</button>}</div>))}</div>)})}</div>}
        {open&&query&&results.length>0&&<div className="autocomplete-dropdown">{results.map(u=>(<div key={u.code} className="autocomplete-item" onMouseDown={e=>e.preventDefault()} onClick={()=>sel(u,false)}><div><div className="autocomplete-item-name">{u.name}</div><div className="autocomplete-item-meta">{u.type}/{u.prefecture}</div></div><div style={{display:"flex",gap:6}}>{onSelect&&<button className="ac-btn" onClick={e=>{e.stopPropagation();sel(u,false)}}>選択</button>}{showMyUniBtn&&onSetMyUni&&<button className="ac-btn primary" onClick={e=>{e.stopPropagation();sel(u,true)}}>★ マイ大学</button>}</div></div>))}</div>}
    </div>);
}

// KPICard
function KPICard({label,value,change,sparkData,kpi,selected,onClick,rank,dataNote,avail,big,catColor}){
    const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current||!sparkData||sparkData.length<2)return;if(inst.current)inst.current.destroy();
        const sparse=isSparse(avail);const dv=avail?nullify(sparkData,avail):sparkData;const tc=getThemeColors();
        const cc=catColor||tc.line;const ccMuted=catColor?(catColor+'33'):'#BCCCDC';
        inst.current=new Chart(cRef.current.getContext("2d"),{type:sparse?"scatter":"line",
            data:{labels:YL,datasets:[{data:sparse?dv.map((v,i)=>v!=null?{x:i,y:v}:null).filter(Boolean):dv,
                borderColor:selected?cc:ccMuted,backgroundColor:sparse?(selected?cc:ccMuted):tc.fill,
                borderWidth:sparse?0:2,fill:!sparse,tension:0,spanGaps:false,pointRadius:sparse?5:3,pointBackgroundColor:selected?cc:ccMuted,pointBorderColor:"transparent",showLine:!sparse}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false},tooltip:{enabled:true,callbacks:{title:i=>{const idx=sparse?i[0].raw?.x:i[0].dataIndex;return YLL[idx]||""},label:i=>fmtVal(sparse?i.raw?.y:i.raw,kpi)}}},
                scales:sparse?{x:{type:"linear",min:-.5,max:6.5,display:false},y:{display:false}}:{x:{display:false},y:{display:false}},animation:{duration:400}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[sparkData,selected,avail]);
    const signal=change==null?"":change>=5?"signal-up":change<=-5?"signal-down":"signal-flat";
    // P0-3: Enhanced trend arrow
    const trendIcon=change==null?"":change>=10?"↑↑":change>=5?"↑":change>-5?"→":change>-10?"↓":"↓↓";
    const cc=change>0?"positive":change<0?"negative":"neutral";
    return(<div className={`kpi-card ${selected?"selected":""} ${signal}`} onClick={onClick} style={selected&&catColor?{borderColor:catColor,boxShadow:`0 0 0 3px ${catColor}22, 0 4px 12px rgba(0,0,0,.07)`}:{}}>
        <div className="kpi-label">{label}</div>
        <div className="kpi-value">{fmtVal(value,kpi)}</div>
        {change!=null&&<span className={`kpi-change ${cc}`}><span className="trend-icon">{trendIcon}</span> {change>0?"+":""}{change.toFixed(1)}%</span>}
        {rank&&<><span className="kpi-rank">全国 {rank.rank}位 / {rank.total}機関</span>
            <div className="pbar">{[...Array(10)].map((_,i)=>{const pct=1-rank.rank/rank.total;const filled=i<Math.round(pct*10);const isTop=pct>=0.8;return<span key={i} className={`pbar-dot ${filled?"filled":""} ${filled&&isTop?"top":""}`}/>})}<span className="pbar-label">上位{Math.round((rank.rank/rank.total)*100)}%</span></div></>}
        {dataNote&&<span className="kpi-note">{dataNote}</span>}
        <div className="kpi-chart"><canvas ref={cRef}></canvas></div>
    </div>);
}

        if(!baseU||!baseN)return;const uIdx=uN.map(v=>v!=null?(v/baseU)*100:null);const nIdx=nN.map(v=>v!=null?(v/baseN)*100:null);const tc=getThemeColors();

        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:13,family:"'Noto Sans JP'"},usePointStyle:true,padding:16,color:tc.text}},datalabels:{display:false},tooltip:{callbacks:{title:i=>YLL[i[0].dataIndex],label:i=>{const raw=i.datasetIndex===0?uN[i.dataIndex]:nN[i.dataIndex];return`${i.dataset.label}: ${i.raw!=null?i.raw.toFixed(1)+"%":"-"} (${fmtVal(raw,kpi)})`}}}},

// CategoryPage
function CategoryPage({category,metadata,onSetMyUni}){
    const[selIdx,setSelIdx]=useState(0);const[natData,setNatData]=useState(null);const[btData,setBtData]=useState(null);
    const[rkData,setRkData]=useState([]);const[unis,setUnis]=useState([]);const[totalUnis,setTotalUnis]=useState(0);
    const[filters,setFilters]=useState({type:"",prefecture:""});const[page,setPage]=useState(0);const[loading,setLoading]=useState(true);
    const kpis=CATEGORY_KPIS[category]||[];const selKpi=kpis[selIdx]||kpis[0];
    const isFiltered=!!(filters.type||filters.prefecture);const filterLabel=[filters.type,filters.prefecture].filter(Boolean).join(" / ")||"全大学";
    const avail=metadata?.data_availability;
    useEffect(()=>{setSelIdx(0);setPage(0)},[category]);
    useEffect(()=>{if(!metadata)return;setLoading(true);api.national(kpis,filters.type||undefined,filters.prefecture||undefined).then(r=>setNatData(r.data||{})).catch(()=>{}).finally(()=>setLoading(false))},[category,metadata,filters]);
    useEffect(()=>{if(!metadata||!selKpi)return;const btP=filters.type?Promise.resolve(null):api.byType([selKpi]).then(r=>r.data||{}).catch(()=>null);const rkP=api.ranking(selKpi,metadata.years.length-1,10,filters.type||undefined,filters.prefecture||undefined).then(r=>r.ranking||[]).catch(()=>[]);Promise.all([btP,rkP]).then(([bt,rk])=>{setBtData(bt);setRkData(rk)})},[selKpi,metadata,filters]);
    useEffect(()=>{if(!metadata||!selKpi)return;api.universities({type:filters.type||undefined,prefecture:filters.prefecture||undefined,kpi:selKpi,sort:"desc",limit:50,offset:page*50}).then(d=>{setUnis(d.universities||[]);setTotalUnis(d.total_count||0)}).catch(()=>{})},[selKpi,filters,page,metadata]);
    const cards=kpis.map((k,i)=>{const v=natData?.[k]||[];const a=avail?.[k];const dv=a?nullify(v,a):v;return{kpi:k,label:kpiL(k,category),value:dv.reduce((l,x)=>x!=null?x:l,null),change:calcChg(v,a),sparkData:dv,dataNote:a?getDataNote(a):null,avail:a}});
    if(loading&&!natData)return<div className="loading-state"><div className="spinner"></div></div>;
    return(<div>
        <div className="filter-bar">
            <div className="filter-group"><label className="filter-label">設置区分</label><select className="filter-select" value={filters.type||""} onChange={e=>{setFilters({...filters,type:e.target.value});setPage(0)}}><option value="">すべて</option>{["国立","公立","私立"].map(t=><option key={t} value={t}>{t}</option>)}</select></div>
            <div className="filter-group"><label className="filter-label">都道府県</label><select className="filter-select" value={filters.prefecture||""} onChange={e=>{setFilters({...filters,prefecture:e.target.value});setPage(0)}}><option value="">すべて</option>{(metadata?.prefectures||[]).map(p=><option key={p} value={p}>{p}</option>)}</select></div>
            <div className="filter-group search-wrapper"><label className="filter-label">大学検索</label><SmartSearch showMyUniBtn={true} onSetMyUni={onSetMyUni}/></div>
        </div>
        {isFiltered&&<div className="context-bar">表示中: {filterLabel}<span className="ctx-clear" onClick={()=>{setFilters({type:"",prefecture:""});setPage(0)}}>解除</span></div>}
        <div className="kpi-grid">{cards.map((c,i)=><KPICard key={c.kpi} {...c} selected={i===selIdx} onClick={()=>{setSelIdx(i);setPage(0)}} big={i===0} catColor={getCatColor(category)}/>)}</div>
        <div className="detail-panel anim-in" style={{borderTopColor:getCatColor(category)}}>
            <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:20}}>
                <span className="detail-title">{kpiL(selKpi,category)}</span>
                <span className="detail-meta">{filterLabel} — 詳細</span>
            </div>
            <ExpandedLineChart data={natData} kpi={selKpi} avail={avail?.[selKpi]} filterLabel={filterLabel} category={category}/>
            <div className="charts-row" style={{marginTop:20,marginBottom:0}}>
                {btData?<StackedBar byTypeData={btData} kpi={selKpi} title="設置区分別 構成比" subtitle={filterLabel}/>:<div className="chart-panel"><div className="empty-state">設置区分フィルター適用中</div></div>}
                {rkData.length>0?<BulletGraph contextData={rkData} kpi={selKpi} title="大学ランキング TOP 10" subtitle={`R6 / ${filterLabel}`} category={category}/>:<div className="chart-panel"><div className="empty-state">ランキングデータなし</div></div>}
            </div>
        </div>
        <CompactTable universities={unis} currentKpi={selKpi} category={category} page={page} onPageChange={setPage} total={totalUnis}/>
    </div>);
}

// P0-1: Executive Summary
function ExecutiveSummary({myUniversity,metadata}){
    const[uniData,setUniData]=useState(null);const[allRanks,setAllRanks]=useState(null);const[loading,setLoading]=useState(true);
    const primaryKpis=SIDEBAR_ITEMS.filter(s=>s!=="概要").map(s=>(CATEGORY_KPIS[s]||[])[0]).filter(Boolean);

    useEffect(()=>{if(!myUniversity||!metadata)return;setLoading(true);
        Promise.all([api.university(myUniversity.code),api.universityRanks(myUniversity.code,primaryKpis,metadata.years.length-1)])
        .then(([u,r])=>{setUniData(u);setAllRanks(r.ranks||{})}).catch(()=>{}).finally(()=>setLoading(false))},[myUniversity,metadata]);

    if(loading)return<div className="loading-state"><div className="spinner"></div></div>;
    const uniKpis=uniData?.kpis||{};
    // Determine strengths and cautions
    const items=SIDEBAR_ITEMS.filter(s=>s!=="概要").map(cat=>{const kpi=(CATEGORY_KPIS[cat]||[])[0];if(!kpi)return null;const vals=uniKpis[kpi]||[];const avail=metadata?.data_availability?.[kpi];const dv=avail?nullify(vals,avail):vals;const latest=dv.reduce((l,x)=>x!=null?x:l,null);const change=calcChg(vals,avail);const rank=allRanks?.[kpi];const pct=rank?(1-rank.rank/rank.total):0;return{cat,kpi,latest,change,rank,pct}}).filter(Boolean);
    const strengths=items.filter(i=>i.pct>=0.8).sort((a,b)=>b.pct-a.pct);
    const cautions=items.filter(i=>i.change!=null&&i.change<-5).sort((a,b)=>a.change-b.change);

    return(<div>
        {/* Insight text */}
        <div className="exec-insight anim-in">
            {strengths.length>0&&<span>💪 <strong>強み:</strong> {strengths.map(s=>`${s.cat}（上位${Math.round((1-s.pct)*100)}%）`).join("、")}。</span>}
            {cautions.length>0&&<span> ⚠️ <strong>要注意:</strong> {cautions.map(c=>`${c.cat}（前年比${c.change.toFixed(1)}%）`).join("、")}。</span>}
            {strengths.length===0&&cautions.length===0&&<span>各カテゴリのパフォーマンスを以下に表示しています。</span>}
        </div>
        {/* Score cards */}
        <div className="exec-grid">{items.map((item,idx)=>{const cls=item.pct>=0.8?"strength":item.change!=null&&item.change<-5?"caution":"neutral";
            const trendIcon=item.change==null?"":item.change>=10?"↑↑":item.change>=5?"↑":item.change>-5?"→":item.change>-10?"↓":"↓↓";
            const cc=item.change>0?"positive":item.change<0?"negative":"neutral";
            return(<div key={item.cat} className={`exec-card ${cls} anim-in`} style={{animationDelay:`${idx*0.05}s`}}>
                <div className="exec-cat">{item.cat}</div>
                <div className="exec-val">{fmtVal(item.latest,item.kpi)}</div>
                {item.change!=null&&<span className={`kpi-change ${cc}`} style={{marginBottom:6}}><span className="trend-icon">{trendIcon}</span> {item.change>0?"+":""}{item.change.toFixed(1)}%</span>}
                {item.rank&&<div className="exec-rank">{item.rank.rank}位 / {item.rank.total}機関</div>}
                {item.rank&&<div className="pbar" style={{marginTop:6}}>{[...Array(10)].map((_,i)=>{const filled=i<Math.round(item.pct*10);return<span key={i} className={`pbar-dot ${filled?"filled":""} ${filled&&item.pct>=0.8?"top":""}`}/>})}<span className="pbar-label">上位{Math.round((1-item.pct)*100+Number.EPSILON)}%</span></div>}
            </div>)})}</div>
    </div>);
}

    const kpis=CATEGORY_KPIS[cat]||[];const selKpi=kpis[selIdx]||kpis[0];const avail=metadata?.data_availability;
    useEffect(()=>{setSelIdx(0)},[cat]);
    useEffect(()=>{if(!myUniversity||!metadata)return;setLoading(true);const k=CATEGORY_KPIS[cat]||[];

    const cards=kpis.map((k,i)=>{const v=uniKpis[k]||[];const a=avail?.[k];const dv=a?nullify(v,a):v;return{kpi:k,label:kpiL(k,cat),value:dv.reduce((l,x)=>x!=null?x:l,null),change:calcChg(v,a),sparkData:dv,rank:ranks?.[k]||null,dataNote:a?getDataNote(a):null,avail:a}});

        <div className="category-tabs"><div className={`cat-tab ${cat==="サマリー"?"active":""}`} onClick={()=>setCat("サマリー")} style={cat==="サマリー"?{background:"var(--primary-900)",color:"#fff"}:{}}>📊 サマリー</div>{SIDEBAR_ITEMS.map(s=><div key={s} className={`cat-tab ${cat===s?"active":""}`} onClick={()=>setCat(s)}>{s}</div>)}</div>

                <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:20}}>
                    <span className="detail-title">{kpiL(selKpi,cat)}</span>
                    <span className="detail-meta">詳細分析</span>

                    {ctx&&ctx.context?<BulletGraph contextData={ctx.context} kpi={selKpi} title="全国順位 前後±5" subtitle={`${ctx.target?.rank}位/${ctx.total_ranked}機関`}/>:<div className="chart-panel"><div className="empty-state">ランキングデータなし</div></div>}
                </div>}

        </>}

// P1-4: 知財パイプライン
const IP_FUNNEL=[{label:"発明届出",kpi:"発明届出件数"},{label:"特許出願",kpi:"特許出願_国内"},{label:"特許保有",kpi:"特許保有_国内"},{label:"許諾中",kpi:"特許保有_国内_実施許諾中"},{label:"許諾権利数",kpi:"実施許諾_国内_権利数"},{label:"許諾収入",kpi:"実施許諾収入_国内"}];

function IPFunnelPage({myUniversity,metadata}){
    const[uniData,setUniData]=useState(null);const[natData,setNatData]=useState(null);const[loading,setLoading]=useState(true);
    useEffect(()=>{if(!myUniversity||!metadata)return;setLoading(true);
        const kpis=IP_FUNNEL.map(f=>f.kpi);
        Promise.all([api.university(myUniversity.code),api.national(kpis)])
        .then(([u,n])=>{setUniData(u);setNatData(n.data||{})}).catch(()=>{}).finally(()=>setLoading(false))},[myUniversity,metadata]);

    if(!myUniversity)return<div className="empty-state">マイ大学を設定すると知財パイプラインが表示されます</div>;
    if(loading)return<div className="loading-state"><div className="spinner"></div></div>;
    const uk=uniData?.kpis||{};const yi=6;
    const items=IP_FUNNEL.map((f,i)=>{const v=(uk[f.kpi]||[])[yi];const nv=(natData[f.kpi]||[])[yi];return{...f,value:v,natValue:nv}});
    const maxVal=Math.max(...items.map(i=>i.value||0),1);
    // コンバージョン率
    const convs=items.slice(1).map((item,i)=>{const prev=items[i].value;return prev&&item.value!=null?((item.value/prev)*100).toFixed(1)+"%":"-"});

    return(<div>
        <div className="uni-banner anim-in"><div style={{display:"flex",alignItems:"baseline"}}><div className="uni-banner-name">{myUniversity.name}</div><div className="uni-banner-meta">{myUniversity.type} / {myUniversity.prefecture}</div></div></div>
        <div className="detail-panel anim-in">
            <div className="detail-title" style={{marginBottom:24}}>知財パイプライン（R6 最新年度）</div>
            <div style={{marginBottom:8,fontSize:12,color:"var(--text-3)"}}>※ 保有は累積ストック、他はフロー。段階間の比率は参考値です。</div>
            {items.map((item,i)=>{const pct=item.value!=null?Math.max((item.value/maxVal)*100,2):0;
                const colors=["#059669","#34D399","#A7F3D0","#00A3BF","#259D63","#FB5B01"];
                return(<div key={i} className="funnel-bar anim-in" style={{animationDelay:`${i*0.08}s`}}>
                    <div className="funnel-label">{item.label}</div>
                    <div className="funnel-track"><div className="funnel-fill" style={{width:`${pct}%`,background:colors[i]}}></div><div className="funnel-value">{isMoney(item.kpi)?fmtVal(item.value,item.kpi):item.value!=null?item.value.toLocaleString():"-"}</div></div>
                    <div className="funnel-conv">{i>0?convs[i-1]:""}</div>
                </div>)})}
        </div>
        {/* 7年推移 */}
        <div className="chart-panel full anim-in"><div className="chart-title">知財パイプライン 7年推移</div><div className="chart-subtitle">{myUniversity.name}</div>
            <IPFunnelTrend uniKpis={uk}/></div>
        {/* ピア比較 */}
        <div className="table-panel anim-in"><div className="table-toolbar"><div className="table-title">コンバージョン率 — {myUniversity.name} vs 全国平均</div></div>
            <table><thead><tr><th>段階</th><th className="numeric">{myUniversity.name}</th><th className="numeric">全国平均</th></tr></thead>
            <tbody>{items.slice(1).map((item,i)=>{const uConv=items[i].value&&item.value!=null?((item.value/items[i].value)*100).toFixed(1)+"%":"-";const nPrev=(natData[items[i].kpi]||[])[yi];const nCurr=(natData[item.kpi]||[])[yi];const nConv=nPrev&&nCurr?((nCurr/nPrev)*100).toFixed(1)+"%":"-";
                return<tr key={i}><td style={{fontWeight:600}}>{items[i].label}→{item.label}</td><td className="numeric">{uConv}</td><td className="numeric">{nConv}</td></tr>})}</tbody></table></div>
    </div>);
}

function IPFunnelTrend({uniKpis}){
    const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        const colors=["#059669","#34D399","#A7F3D0","#00A3BF","#259D63","#FB5B01"];
        const datasets=IP_FUNNEL.filter(f=>!isMoney(f.kpi)).map((f,i)=>({label:f.label,data:uniKpis[f.kpi]||[],borderColor:colors[i],backgroundColor:"transparent",borderWidth:2,tension:0,pointRadius:3,pointBackgroundColor:colors[i]}));
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"line",data:{labels:YL,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:12},usePointStyle:true,padding:12,color:tc.text}},datalabels:{display:false}},scales:{y:{beginAtZero:true,border:{display:false},grid:{color:tc.grid},ticks:{color:tc.text,font:{size:11}}},x:{border:{display:false},grid:{display:false},ticks:{color:tc.text,font:{size:12}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[uniKpis]);
    return(<div style={{height:260}}><canvas ref={cRef}></canvas></div>);
}

// P2-4: Command Palette
function CommandPalette({open,onClose,onNavigate,onSetMyUni,metadata}){
    const[query,setQuery]=useState("");const[results,setResults]=useState([]);const inputRef=useRef(null);
    useEffect(()=>{if(open&&inputRef.current){inputRef.current.focus();setQuery("");setResults([])}}, [open]);
    useEffect(()=>{if(!open)return;const handler=e=>{if(e.key==="Escape")onClose()};document.addEventListener("keydown",handler);return()=>document.removeEventListener("keydown",handler)},[open,onClose]);

    const search=async q=>{setQuery(q);if(!q.trim()){setResults([]);return}
        const cats=SIDEBAR_ITEMS.filter(s=>s.includes(q)).map(s=>({type:"nav",label:s,meta:"カテゴリ",action:()=>{onNavigate({type:"category",id:s});onClose()}}));
        const specials=[{match:"マイ大学",type:"nav",label:"★ マイ大学",meta:"マイ大学ページ",action:()=>{onNavigate({type:"my-university",id:null});onClose()}},{match:"比較",type:"nav",label:"⇔ 大学比較",meta:"比較ページ",action:()=>{onNavigate({type:"comparison",id:null});onClose()}},{match:"知財",type:"nav",label:"📊 知財パイプライン",meta:"知財分析",action:()=>{onNavigate({type:"ip-funnel",id:null});onClose()}}].filter(s=>s.match.includes(q));
        let unis=[];try{const d=await api.universities({search:q,limit:5});unis=(d.universities||[]).map(u=>({type:"uni",label:u.name,meta:`${u.type}/${u.prefecture}`,action:()=>{onSetMyUni(u);onNavigate({type:"my-university",id:null});onClose()}}))}catch{}
        setResults([...cats,...specials,...unis]);
    };

    if(!open)return null;
    return(<div className="cmd-overlay" onClick={onClose}><div className="cmd-palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} className="cmd-input" placeholder="大学名、カテゴリ、機能を検索..." value={query} onChange={e=>search(e.target.value)}/>
        <div className="cmd-results">{results.length===0&&query?<div style={{padding:16,color:"var(--text-3)",textAlign:"center"}}>結果なし</div>:
            results.map((r,i)=><div key={i} className="cmd-item" onClick={r.action}><div><div className="cmd-item-label">{r.label}</div><div className="cmd-item-meta">{r.meta}</div></div></div>)}
        {!query&&<div style={{padding:16,color:"var(--text-3)",fontSize:13,textAlign:"center"}}>大学名・カテゴリ名を入力して検索</div>}
        </div></div></div>);
}

// ComparisonPage
function ComparisonPage({myUniversity,metadata}){
    const[slots,setSlots]=useState(()=>myUniversity?[myUniversity]:[]);const[cat,setCat]=useState("概要");const[compData,setCompData]=useState(null);const[searchSlot,setSearchSlot]=useState(null);
    const kpis=CATEGORY_KPIS[cat]||[];
    useEffect(()=>{if(myUniversity&&(slots.length===0||slots[0]?.code!==myUniversity.code)){setSlots(prev=>{const rest=prev.filter(s=>s.code!==myUniversity.code);return[myUniversity,...rest].slice(0,4)})}},[myUniversity]);
    useEffect(()=>{if(slots.length<1||!metadata){setCompData(null);return}api.multiUni(slots.map(s=>s.code),kpis,metadata.years.length-1).then(r=>setCompData(r.universities||[])).catch(()=>setCompData(null))},[slots,cat,metadata]);
    const addUni=u=>{if(slots.length>=4||slots.some(s=>s.code===u.code))return;setSlots([...slots,{code:u.code,name:u.name,type:u.type,prefecture:u.prefecture}]);setSearchSlot(null)};
    const removeUni=i=>setSlots(slots.filter((_,j)=>j!==i));
    return(<div>
        <div className="compare-slots">{[0,1,2,3].map(i=>{const s=slots[i];return(<div key={i} className={`compare-slot ${s?"filled":""}`} style={s?{borderColor:COMP_COLORS[i]}:{}}>
            {s?<><div style={{display:"flex",alignItems:"center"}}><span className="slot-color" style={{background:COMP_COLORS[i]}}></span><span className="slot-name">{s.name}</span></div><div className="slot-meta">{s.type}/{s.prefecture}</div>
            {(i>0||!myUniversity||s.code!==myUniversity.code)&&<button className="slot-remove" onClick={()=>removeUni(i)}>✕</button>}</>
            :searchSlot===i?<SmartSearch onSelect={addUni} placeholder="大学名..." showSuggestions={true}/>:<div className="slot-add" onClick={()=>setSearchSlot(i)}>+ 大学を追加</div>}</div>)})}</div>
        <div className="category-tabs" style={{marginBottom:28}}>{SIDEBAR_ITEMS.map(s=><div key={s} className={`cat-tab ${cat===s?"active":""}`} onClick={()=>setCat(s)}>{s}</div>)}</div>
        {!compData||compData.length<2?<div className="empty-state">{slots.length<2?"比較するには2つ以上の大学を選択してください":"読み込み中..."}</div>:<>
            <RadarChart universities={compData} kpis={kpis} category={cat}/>
            <div className="comp-kpi-grid">{kpis.map(kpi=>{const vals=compData.map(u=>{const a=u.kpis?.[kpi]||[];return a.length?a[a.length-1]||0:0});return(<div key={kpi} className="comp-kpi-panel"><div className="comp-kpi-title">{kpiL(kpi,cat)}</div><CompMiniBar unis={compData} vals={vals} kpi={kpi}/></div>)})}</div>
            <CompTable universities={compData} kpis={kpis} category={cat}/>
        </>}
    </div>);
}

function CompMiniBar({unis,vals,kpi}){const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"bar",data:{labels:unis.map(u=>u.name.length>10?u.name.substring(0,10)+"…":u.name),datasets:[{data:vals,backgroundColor:unis.map((_,i)=>COMP_COLORS[i]),borderRadius:4,barThickness:18}]},
            options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},scales:{x:{beginAtZero:true,border:{display:false},grid:{color:tc.grid},ticks:{color:tc.text,font:{size:10},callback:yTick(kpi)}},y:{border:{display:false},grid:{display:false},ticks:{color:tc.text,font:{size:12}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[unis,vals,kpi]);
    return(<div style={{height:Math.max(70,unis.length*30)}}><canvas ref={cRef}></canvas></div>);
}

function RadarChart({universities,kpis,category}){const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current||!universities||universities.length<2)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        const labels=kpis.map(k=>kpiL(k,category));
        const datasets=universities.map((u,i)=>({label:u.name,data:kpis.map(k=>u.percentiles?.[k]??0),backgroundColor:COMP_BG[i],borderColor:COMP_COLORS[i],borderWidth:2.5,pointRadius:5,pointStyle:COMP_MARKERS[i],pointBackgroundColor:COMP_COLORS[i]}));
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"radar",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10},backdropColor:"transparent",color:tc.text},pointLabels:{font:{size:13,family:"'Noto Sans JP'"},color:tc.text},grid:{color:tc.grid}}},plugins:{legend:{position:"bottom",labels:{font:{size:13},usePointStyle:true,padding:16,color:tc.text}},datalabels:{display:false},tooltip:{callbacks:{label:item=>{const k=kpis[item.dataIndex];const uni=universities[item.datasetIndex];const a=uni.kpis?.[k];const latest=a?a[a.length-1]:null;return`${item.dataset.label}: ${item.raw.toFixed(1)}パーセンタイル (${fmtVal(latest,k)})`}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[universities,kpis,category]);
    return(<div className="chart-panel full"><div className="chart-title">KPI比較レーダーチャート</div><div className="chart-subtitle">パーセンタイル順位 — 外側ほど上位</div><div className="chart-canvas-wrapper radar"><canvas ref={cRef}></canvas></div></div>);
}

function CompTable({universities,kpis,category}){
    return(<div className="table-panel"><div className="table-toolbar"><div className="table-title">比較テーブル — {category}</div></div><table><thead><tr><th>KPI</th>{universities.map((u,i)=><th key={i}><span style={{display:"inline-block",width:12,height:12,borderRadius:3,background:COMP_COLORS[i],marginRight:6,verticalAlign:"middle"}}></span>{u.name.length>10?u.name.substring(0,10)+"…":u.name}</th>)}</tr></thead>
        <tbody>{kpis.map(k=>{const vals=universities.map(u=>{const a=u.kpis?.[k]||[];return a.length?a[a.length-1]:null});const maxV=Math.max(...vals.filter(v=>v!=null));
            return(<tr key={k}><td style={{fontWeight:600}}>{kpiL(k,category)}</td>{vals.map((v,i)=><td key={i} className={v!=null&&v===maxV&&maxV>0?"highlight numeric":"numeric"}>{fmtVal(v,k)}</td>)}</tr>)})}</tbody></table></div>);
}

// App
function App(){
    const[theme,setTheme]=useState(()=>localStorage.getItem("sangaku_theme")||"light");
    const[currentPage,setCurrentPage]=useState({type:"landing",id:null});
    const[metadata,setMetadata]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
    const[sidebarOpen,setSidebarOpen]=useState(false);
    const[sidebarCollapsed,setSidebarCollapsed]=useState(false);
    const[cmdOpen,setCmdOpen]=useState(false);
    const[myUniversity,setMyUniversity]=useState(()=>{try{const r=localStorage.getItem("sangaku_myUniversity");return r?JSON.parse(r):null}catch{return null}});

    useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("sangaku_theme",theme)},[theme]);
    useEffect(()=>{if(currentPage.type==="category"&&currentPage.id){const c=getCatColor(currentPage.id);const f=getCatFill(currentPage.id);const r=document.documentElement.style;r.setProperty("--sidebar-active-border",c);r.setProperty("--sidebar-active-bg",f);r.setProperty("--sidebar-active-text",c)}else{const r=document.documentElement.style;r.removeProperty("--sidebar-active-border");r.removeProperty("--sidebar-active-bg");r.removeProperty("--sidebar-active-text")}},[currentPage,theme]);
    useEffect(()=>{if(myUniversity)localStorage.setItem("sangaku_myUniversity",JSON.stringify(myUniversity));else localStorage.removeItem("sangaku_myUniversity")},[myUniversity]);
    // P2-4: Cmd+K shortcut
    useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(true)}};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[]);
    const toggleTheme=useCallback(()=>setTheme(t=>t==="dark"?"light":"dark"),[]);
    const handleSetMyUni=useCallback(u=>{if(!u)return;setMyUniversity({code:u.code,name:u.name,type:u.type,prefecture:u.prefecture})},[]);
    const handleClearMyUni=useCallback(()=>setMyUniversity(null),[]);

    useEffect(()=>{api.metadata().then(setMetadata).catch(e=>setError(e.message)).finally(()=>setLoading(false))},[]);

    // Landing Page
    if(currentPage.type==="landing")return<LandingPage onEnter={()=>setCurrentPage({type:"category",id:"概要"})} theme={theme} onToggleTheme={toggleTheme}/>;

    if(loading&&!metadata)return(<div className="app"><Sidebar currentPage={currentPage} onChange={setCurrentPage} myUniversity={myUniversity} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)}/><div className="main-content"><div className="page-header"><div className="page-title">読み込み中...</div></div><div className="content"><div className="loading-state"><div className="spinner"></div></div></div></div></div>);

    const pageTitle=currentPage.type==="my-university"?"★ マイ大学":currentPage.type==="comparison"?"⇔ 大学比較":currentPage.type==="ip-funnel"?"📊 知財パイプライン":currentPage.id;
    const pageMeta=currentPage.type==="my-university"?(myUniversity?myUniversity.name:"未設定"):currentPage.type==="comparison"?"最大4大学を比較":currentPage.type==="ip-funnel"?"発明→出願→保有→許諾→収入":"H30–R6";

    return(<div className={`app ${sidebarCollapsed?"sidebar-collapsed":""}`}>
        <Sidebar currentPage={currentPage} onChange={setCurrentPage} myUniversity={myUniversity} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} collapsed={sidebarCollapsed} onToggleCollapse={()=>setSidebarCollapsed(!sidebarCollapsed)}/>
        <div className="main-content">
            <div className="page-header">
                <div className="page-header-left">
                    <button className="menu-btn" onClick={()=>setSidebarOpen(true)} style={{display:sidebarCollapsed||window.innerWidth<=1023?"flex":"none"}}><IC.menu size={20}/></button>
                    <nav className="breadcrumb" aria-label="breadcrumb">
                        <span style={{cursor:"pointer"}} onClick={()=>setCurrentPage({type:"category",id:"概要"})}>ダッシュボード</span>
                        <span className="breadcrumb-sep"><IC.chevronR size={14}/></span>
                        <span className="breadcrumb-current">{pageTitle}</span>
                    </nav>
                </div>
                <div className="page-header-right">
                    {myUniversity?<div className="myuni-chip" onClick={()=>setCurrentPage({type:"my-university",id:null})}>★ {myUniversity.name}</div>:<div className="myuni-chip myuni-chip-set" onClick={()=>setCurrentPage({type:"my-university",id:null})}>マイ大学を設定</div>}
                    <button className="theme-toggle" onClick={toggleTheme}>{theme==="dark"?"☀️":"🌙"}</button>
                    <button className="theme-toggle cmd-k-btn" onClick={()=>setCmdOpen(true)} title="⌘K" style={{fontSize:13,fontFamily:"var(--font-display)"}}>⌘K</button>
                </div>
            </div>
            <div className="print-header">{myUniversity?`${myUniversity.name} — 産連調査Viewer`:"産連調査Viewer"} ({new Date().toLocaleDateString("ja-JP")})</div>
            <CommandPalette open={cmdOpen} onClose={()=>setCmdOpen(false)} onNavigate={setCurrentPage} onSetMyUni={handleSetMyUni} metadata={metadata}/>
            <div className="content">{error&&<div className="error-banner">{error}</div>}
                {currentPage.type==="category"&&<CategoryPage key={currentPage.id} category={currentPage.id} metadata={metadata} onSetMyUni={handleSetMyUni}/>}
                {currentPage.type==="my-university"&&<MyUniversityPage myUniversity={myUniversity} metadata={metadata} onSetMyUni={handleSetMyUni} onClear={handleClearMyUni}/>}
                {currentPage.type==="comparison"&&<ComparisonPage myUniversity={myUniversity} metadata={metadata}/>}
                {currentPage.type==="ip-funnel"&&<IPFunnelPage myUniversity={myUniversity} metadata={metadata}/>}
            </div>
            <Footer/>
        </div>
    </div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
