<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>産連調査Viewer — 産学連携データ可視化ダッシュボード</title>
    <meta name="description" content="全国1,102大学等の産学連携データ（H30〜R6・58指標）を閲覧・比較。文部科学省「産学連携等実施状況調査」を可視化した非公式ダッシュボード。">
    <meta property="og:title" content="産連調査Viewer — 産学連携データ可視化ダッシュボード">
    <meta property="og:description" content="全国1,102機関の産学連携データ（H30〜R6・58指標）を閲覧・比較できます。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://unifactbook.pages.dev/">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:creator" content="@pogohopper8">
    <link rel="canonical" href="https://unifactbook.pages.dev/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <style>
        /* ══════════════════════════════════════════════════════════
           産連調査Viewer — Design Tokens
           Personality: 正確・モダン・信頼 / Green institutional
           ══════════════════════════════════════════════════════════ */
        :root {
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Noto Sans JP', sans-serif;
            --font-mono: 'Noto Sans Mono', monospace;
            --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-md:1.125rem;--text-lg:1.25rem;--text-xl:1.5rem;--text-2xl:1.75rem;--text-3xl:2.25rem;--text-display:3rem;
            --leading-tight:1.3;--leading-normal:1.5;--leading-data:1.1;
            --tracking-tight:-.02em;--tracking-normal:0;--tracking-wide:.02em;
            --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;
            --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-full:9999px;
            --ease-fast:150ms ease;--ease-normal:200ms ease;--ease-slow:300ms ease;
            --sidebar-width:240px;
        }
        [data-theme="light"]{
            --surface:#fff;--surface-alt:#EEF5F2;--card:#fff;--card-hover:#F4FAF7;
            --text-1:#0C1811;--text-2:rgba(12,24,17,.64);--text-3:rgba(12,24,17,.44);--text-inv:#fff;
            --border:rgba(12,24,17,.12);--border-2:rgba(12,24,17,.06);--border-strong:rgba(12,24,17,.22);
            --brand:#1A7A5C;--brand-subtle:#E8F5F0;--brand-text:#145C45;
            --cta:#C48A20;--cta-hover:#A87418;
            --signal-pos:#1E7B65;--signal-neg:#B22323;--signal-warn:#916626;
            --signal-pos-bg:#E8F5F0;--signal-neg-bg:#FEF2F2;--signal-warn-bg:#FFF8EB;
            --chart-national:#1A5C3A;--chart-public:#3B6E9C;--chart-private:#D4A843;
            --chart-grid:rgba(12,24,17,.06);--chart-text:rgba(12,24,17,.54);--chart-line:#1A7A5C;--chart-fill:rgba(26,122,92,.08);
            --input-bg:#fff;--input-focus:rgba(26,122,92,.16);
            --sidebar-bg:#fff;--sidebar-active:#E8F5F0;--sidebar-active-text:#145C45;--sidebar-active-border:#1A7A5C;
            --shadow-float:0 4px 16px rgba(12,24,17,.08),0 0 0 1px rgba(12,24,17,.04);
        }
        [data-theme="dark"]{
            --surface:#0D1512;--surface-alt:#141E1A;--card:#1A2420;--card-hover:#222E29;
            --text-1:rgba(255,255,255,.92);--text-2:rgba(255,255,255,.64);--text-3:rgba(255,255,255,.40);--text-inv:#0D1512;
            --border:rgba(255,255,255,.10);--border-2:rgba(255,255,255,.05);--border-strong:rgba(255,255,255,.20);
            --brand:#34D399;--brand-subtle:rgba(52,211,153,.10);--brand-text:#6EE7B7;
            --cta:#FBBF24;--cta-hover:#F59E0B;
            --signal-pos:#34D399;--signal-neg:#F87171;--signal-warn:#FBBF24;
            --signal-pos-bg:rgba(52,211,153,.12);--signal-neg-bg:rgba(248,113,113,.12);--signal-warn-bg:rgba(251,191,36,.12);
            --chart-national:#34D399;--chart-public:#7DD3FC;--chart-private:#FBBF24;
            --chart-grid:rgba(255,255,255,.06);--chart-text:rgba(255,255,255,.54);--chart-line:#34D399;--chart-fill:rgba(52,211,153,.10);
            --input-bg:#1A2420;--input-focus:rgba(52,211,153,.20);
            --sidebar-bg:#111B17;--sidebar-active:rgba(52,211,153,.10);--sidebar-active-text:#6EE7B7;--sidebar-active-border:#34D399;
            --shadow-float:0 4px 16px rgba(0,0,0,.24),0 0 0 1px rgba(255,255,255,.06);
        }

        /* ── Reset ── */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{min-height:100vh;font-family:var(--font-body);-webkit-font-smoothing:antialiased;background:var(--surface);color:var(--text-1);font-size:var(--text-base);line-height:var(--leading-normal);transition:background var(--ease-slow),color var(--ease-slow);overflow-x:hidden}
        #root{min-height:100vh}

        /* ── Animations ── */
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .anim-in{animation:fadeIn .4s ease-out both}
        .anim-delay-1{animation-delay:.05s}.anim-delay-2{animation-delay:.1s}.anim-delay-3{animation-delay:.15s}.anim-delay-4{animation-delay:.2s}.anim-delay-5{animation-delay:.25s}

        /* ══════════════════════════════════════════════════════════
           Layout
           ══════════════════════════════════════════════════════════ */
        .app{display:flex;min-height:100vh}
        .main-content{flex:1;margin-left:var(--sidebar-width);display:flex;flex-direction:column;min-height:100vh;transition:margin var(--ease-slow);min-width:0;overflow-x:hidden}
        .content{flex:1;padding:var(--space-8) var(--space-12) var(--space-10);max-width:840px;margin:0 auto;overflow:hidden;width:100%}
        @media(min-width:1400px){.content{max-width:960px}}

        /* ── Sidebar ── */
        .sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);color:var(--text-2);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;border-right:1px solid var(--border);transition:width var(--ease-normal),transform var(--ease-slow),background var(--ease-slow);will-change:width;overflow:hidden}
        .sidebar-header{padding:var(--space-6) var(--space-6) var(--space-5);border-bottom:1px solid var(--border)}
        .sidebar-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:700;color:var(--text-1);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight)}
        .sidebar-subtitle{font-size:var(--text-xs);color:var(--text-3);margin-top:var(--space-2)}
        .sidebar-nav{padding:var(--space-3) 0;flex:1;overflow-y:auto}
        .sidebar-item{display:flex;align-items:center;padding:var(--space-3) var(--space-4);cursor:pointer;font-size:var(--text-sm);font-weight:500;color:var(--text-2);transition:background var(--ease-fast),color var(--ease-fast);border-left:3px solid transparent;gap:var(--space-2)}
        .sidebar-item:hover{background:var(--card-hover);color:var(--text-1)}
        .sidebar-item.active{background:var(--sidebar-active);color:var(--sidebar-active-text);border-left-color:var(--sidebar-active-border);font-weight:600}
        .sidebar-sep{height:1px;background:var(--border);margin:var(--space-3) var(--space-6)}
        .sidebar-sep-label{font-size:var(--text-xs);font-weight:600;color:var(--text-3);padding:var(--space-3) var(--space-4) var(--space-1);text-transform:uppercase;letter-spacing:.05em}
        .sidebar-badge{font-size:var(--text-xs);background:var(--border-2);padding:2px var(--space-2);border-radius:var(--radius-sm);margin-left:auto;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2)}
        .sidebar-footer{padding:var(--space-5) var(--space-6);border-top:1px solid var(--border);font-size:var(--text-xs);color:var(--text-3)}
        .sidebar-collapse-btn{background:none;border:none;color:var(--text-2);cursor:pointer;padding:var(--space-3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;width:100%;border-top:1px solid var(--border);transition:color var(--ease-fast)}
        .sidebar-collapse-btn:hover{color:var(--text-1);background:var(--card-hover)}
        .sidebar-icon{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;overflow:visible}
        .sidebar-label{white-space:nowrap;overflow:hidden;transition:opacity var(--ease-fast),width var(--ease-fast)}
        .sidebar.collapsed{width:56px;min-width:56px}
        .sidebar.collapsed .sidebar-header{padding:var(--space-4) var(--space-2);text-align:center}
        .sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-subtitle,.sidebar.collapsed .sidebar-footer,.sidebar.collapsed .sidebar-badge{display:none}
        .sidebar.collapsed .sidebar-item{justify-content:center;padding:var(--space-3) 0;border-left:none;gap:0}
        .sidebar.collapsed .sidebar-label{opacity:0;width:0;padding:0;margin:0;overflow:hidden}
        .sidebar.collapsed .sidebar-sep{margin:var(--space-2) var(--space-3)}
        .sidebar.collapsed .sidebar-item{position:relative}
        .sidebar.collapsed .sidebar-item::after{content:attr(data-tooltip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:var(--text-1);color:var(--surface);padding:var(--space-1) var(--space-3);border-radius:var(--radius-sm);font-size:var(--text-xs);font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--ease-fast);z-index:100}
        .sidebar.collapsed .sidebar-item:hover::after{opacity:1}
        .app.sidebar-collapsed .main-content{margin-left:56px}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40}

        /* ── Header ── */
        .page-header{background:var(--card);border-bottom:1px solid var(--border);padding:var(--space-3) var(--space-10);display:flex;align-items:center;justify-content:space-between;transition:background var(--ease-slow)}
        .page-header-left{display:flex;align-items:center;gap:var(--space-3)}
        .page-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;letter-spacing:var(--tracking-tight)}
        .page-meta{font-size:var(--text-sm);color:var(--text-2)}
        .page-header-right{display:flex;align-items:center;gap:var(--space-3)}
        .menu-btn{background:none;border:none;color:var(--text-2);cursor:pointer;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);display:flex;align-items:center;transition:background var(--ease-fast),color var(--ease-fast)}
        .menu-btn:hover{background:var(--border-2);color:var(--text-1)}
        .breadcrumb{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-3)}
        .breadcrumb-sep{display:flex;align-items:center}
        .breadcrumb-current{color:var(--text-1);font-weight:600}
        .myuni-chip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);background:var(--brand-subtle);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--text-sm);color:var(--brand-text);cursor:pointer;font-weight:600;transition:background var(--ease-fast)}
        .myuni-chip:hover{background:var(--card-hover)}
        .myuni-chip-set{color:var(--text-3);border:1px dashed var(--border);background:transparent;font-weight:500}
        .theme-toggle{width:40px;height:40px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:var(--text-md);transition:background var(--ease-normal)}
        .theme-toggle:hover{background:var(--card-hover)}

        /* ── Filters ── */
        .filter-bar{display:flex;align-items:flex-end;gap:var(--space-5);margin-bottom:var(--space-6);flex-wrap:wrap}
        .filter-group{display:flex;flex-direction:column;gap:var(--space-1);flex:1;min-width:100px}
        .filter-label{font-size:var(--text-xs);color:var(--text-2);font-weight:600;letter-spacing:var(--tracking-wide)}
        .filter-select,.filter-input{padding:var(--space-2) var(--space-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--text-sm);font-family:var(--font-body);background:var(--input-bg);color:var(--text-1);min-width:0;width:100%;transition:border-color var(--ease-fast)}
        .filter-select:focus,.filter-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--input-focus)}
        .search-wrapper{position:relative}
        .autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:0 0 var(--radius-md) var(--radius-md);box-shadow:var(--shadow-float);z-index:20;max-height:360px;overflow-y:auto}
        .ac-group-label{padding:var(--space-2) var(--space-4);font-size:var(--text-xs);font-weight:700;color:var(--text-3);background:var(--surface-alt);letter-spacing:.05em}
        .autocomplete-item{padding:var(--space-3) var(--space-4);cursor:pointer;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between;transition:background var(--ease-fast)}
        .autocomplete-item:hover{background:var(--card-hover)}
        .autocomplete-item-name{font-size:var(--text-sm);font-weight:600}
        .autocomplete-item-meta{font-size:var(--text-xs);color:var(--text-2)}
        .ac-btn{font-size:var(--text-xs);padding:var(--space-1) var(--space-3);border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);background:var(--card);font-family:var(--font-body);font-weight:500;white-space:nowrap;transition:background var(--ease-fast),color var(--ease-fast);color:var(--text-1)}
        .ac-btn:hover{background:var(--card-hover)}
        .ac-btn.primary{background:var(--brand);color:var(--text-inv);border-color:var(--brand)}
        .ac-btn.primary:hover{opacity:.85}
        .context-bar{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);padding:var(--space-3) var(--space-4);background:var(--brand-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--brand-text);font-weight:500}
        .context-bar .ctx-clear{cursor:pointer;margin-left:auto;text-decoration:underline;font-weight:400}

        /* ══════════════════════════════════════════════════════════
           KPI Cards
           ══════════════════════════════════════════════════════════ */
        .kpi-grid{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-5)}
        .kpi-card{flex:1 1 180px;min-width:140px;background:var(--card);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);cursor:pointer;transition:background var(--ease-fast),border-color var(--ease-fast);border:1px solid var(--border);position:relative;overflow:hidden}
        .kpi-card:hover{background:var(--card-hover);border-color:var(--border-strong)}
        .kpi-card.selected{border-color:var(--brand);background:var(--brand-subtle)}
        .kpi-card.kpi-primary{flex:0 1 280px}
        .kpi-card::before{display:none}
        .kpi-label{font-size:var(--text-sm);color:var(--text-2);font-weight:600;margin-bottom:var(--space-3)}
        .kpi-value{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;line-height:var(--leading-data);margin-bottom:var(--space-1);letter-spacing:var(--tracking-tight)}
        .kpi-primary .kpi-value{font-size:var(--text-3xl)}
        .kpi-change{display:inline-flex;align-items:center;font-size:var(--text-sm);font-weight:700;padding:2px var(--space-3);border-radius:var(--radius-sm)}
        .kpi-change.positive{color:var(--signal-pos);background:var(--signal-pos-bg)}
        .kpi-change.negative{color:var(--signal-neg);background:var(--signal-neg-bg)}
        .kpi-change.neutral{color:var(--text-3);background:var(--border-2)}
        .kpi-rank{display:block;font-size:var(--text-xs);color:var(--text-2);margin-top:var(--space-2)}
        .kpi-note{display:block;font-size:var(--text-xs);color:var(--signal-neg);margin-top:var(--space-1)}
        .kpi-chart{margin-top:var(--space-2);height:48px;width:100%}
        .kpi-myuni{font-size:var(--text-xs);color:var(--brand);margin-top:var(--space-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:var(--leading-tight)}
        .trend-icon{font-size:var(--text-xs);font-weight:700}
        .pbar{display:flex;align-items:center;gap:3px;margin-top:var(--space-2)}
        .pbar-dot{width:8px;height:8px;border-radius:var(--radius-sm);background:var(--border);transition:background var(--ease-normal)}
        .pbar-dot.filled{background:var(--brand)}
        .pbar-dot.filled.top{background:var(--brand-text)}
        .pbar-label{font-size:var(--text-xs);color:var(--text-2);margin-left:var(--space-2);white-space:nowrap}

        /* ── Panels ── */
        .detail-panel{background:var(--card);border-radius:var(--radius-md);border:1px solid var(--border);padding:var(--space-8);margin-bottom:var(--space-8);transition:background var(--ease-slow)}
        .detail-panel.myuni-focus{border-color:var(--brand);background:var(--brand-subtle)}
        .detail-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;letter-spacing:var(--tracking-tight)}
        .detail-meta{font-size:var(--text-sm);color:var(--text-2);margin-left:var(--space-3)}
        .charts-row{display:grid;grid-template-columns:3fr 2fr;gap:var(--space-4);margin-bottom:var(--space-8)}
        .charts-row>*{min-width:0}
        .chart-panel{background:var(--card);border-radius:var(--radius-md);padding:var(--space-6);border:1px solid var(--border);transition:background var(--ease-slow);overflow:hidden;min-width:0;position:relative}
        .chart-panel.full{margin-bottom:var(--space-8)}
        .chart-title{font-family:var(--font-display);font-size:var(--text-md);font-weight:700;margin-bottom:var(--space-1);letter-spacing:var(--tracking-tight)}
        .chart-subtitle{font-size:var(--text-xs);color:var(--text-2);margin-bottom:var(--space-5)}
        .chart-note{font-size:var(--text-xs);color:var(--signal-neg);margin-bottom:var(--space-3)}
        .chart-canvas-wrapper{position:relative;width:100%}
        .chart-canvas-wrapper.trend{height:300px}
        .chart-canvas-wrapper.small{height:260px}
        .chart-canvas-wrapper.radar{height:380px}
        .export-btn{position:absolute;top:var(--space-4);right:var(--space-4);background:var(--card-hover);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--space-1) var(--space-3);cursor:pointer;font-size:var(--text-xs);color:var(--text-2);opacity:0;transition:opacity var(--ease-normal);font-family:var(--font-body);z-index:5}
        .chart-panel:hover .export-btn,.detail-panel:hover .export-btn{opacity:1}
        .export-btn:hover{background:var(--brand-subtle);color:var(--brand-text);border-color:var(--brand)}
        .csv-btn{padding:var(--space-2) var(--space-3);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:var(--text-xs);font-family:var(--font-body);color:var(--text-2);transition:background var(--ease-fast),color var(--ease-fast)}
        .csv-btn:hover{background:var(--brand-subtle);color:var(--brand-text);border-color:var(--brand)}

        /* ── Table ── */
        .table-panel{background:var(--card);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;margin-bottom:var(--space-8);transition:background var(--ease-slow)}
        .table-toolbar{padding:var(--space-4) var(--space-6);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .table-title{font-family:var(--font-display);font-size:var(--text-md);font-weight:700}
        .table-count{font-size:var(--text-sm);color:var(--text-2)}
        .table-search{padding:var(--space-2) var(--space-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--text-sm);font-family:var(--font-body);width:220px;background:var(--input-bg);color:var(--text-1);transition:border-color var(--ease-fast)}
        .table-search:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--input-focus)}
        .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
        .table-scroll th:nth-child(1),.table-scroll td:nth-child(1){position:sticky;left:0;z-index:2;background:var(--card)}
        .table-scroll th:nth-child(2),.table-scroll td:nth-child(2){position:sticky;left:48px;z-index:2;background:var(--card)}
        .table-scroll thead th:nth-child(1),.table-scroll thead th:nth-child(2){z-index:3;background:var(--surface-alt)}
        table{width:100%;border-collapse:collapse;font-size:var(--text-sm);min-width:700px}
        thead{background:var(--surface-alt)}
        thead th{text-align:left;padding:var(--space-3) var(--space-4);font-size:var(--text-xs);font-weight:700;color:var(--text-2);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
        thead th.numeric{text-align:right}
        tbody td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-2);color:var(--text-1);font-variant-numeric:tabular-nums;transition:background var(--ease-fast)}
        tbody td.numeric{text-align:right;font-family:var(--font-mono);font-weight:500}
        tbody tr:hover{background:var(--brand-subtle)}
        td.highlight{background:var(--brand-subtle);font-weight:700;color:var(--brand-text)}
        .pagination{display:flex;align-items:center;justify-content:center;gap:var(--space-4);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border)}
        .pagination-btn{padding:var(--space-2) var(--space-4);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:var(--text-sm);font-family:var(--font-body);font-weight:500;color:var(--text-1);transition:background var(--ease-fast),border-color var(--ease-fast)}
        .pagination-btn:disabled{opacity:.35;cursor:default}
        .pagination-btn:not(:disabled):hover{border-color:var(--brand);background:var(--brand-subtle)}
        .pagination-info{font-size:var(--text-sm);color:var(--text-2)}

        /* ── My University ── */
        .myuni-highlight{background:var(--brand-subtle);font-weight:600}
        .myuni-highlight td:nth-child(1),.myuni-highlight td:nth-child(2){background:var(--brand-subtle)}
        .myuni-highlight td:first-child{border-left:3px solid var(--brand)}
        .myuni-highlight td:nth-child(2){color:var(--brand-text)}
        tbody tr:hover td:nth-child(1),tbody tr:hover td:nth-child(2){background:var(--brand-subtle)}
        .myuni-promo{background:var(--brand-subtle);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-5);display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);font-size:var(--text-sm);color:var(--text-1)}
        .myuni-promo button{padding:var(--space-2) var(--space-4);border-radius:var(--radius-sm);font-size:var(--text-sm);font-family:var(--font-body);cursor:pointer;border:none;font-weight:600}
        .myuni-promo .promo-cta{background:var(--brand);color:var(--text-inv)}
        .myuni-promo .promo-cta:hover{opacity:.85}
        .myuni-promo .promo-close{background:transparent;color:var(--text-3);font-size:var(--text-base);padding:var(--space-1) var(--space-2);margin-left:auto}
        .uni-banner{background:var(--brand-subtle);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-4) var(--space-6);margin-bottom:var(--space-6);display:flex;align-items:center;justify-content:space-between;transition:background var(--ease-slow)}
        .uni-banner-name{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;color:var(--text-1);letter-spacing:var(--tracking-tight)}
        .uni-banner-meta{font-size:var(--text-sm);color:var(--text-2);margin-left:var(--space-3)}

        /* ── Buttons & Chips ── */
        .btn-sm{padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);cursor:pointer;font-size:var(--text-sm);font-family:var(--font-body);font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text-1);transition:background var(--ease-fast),color var(--ease-fast)}
        .btn-sm:hover{background:var(--card-hover)}
        .btn-sm.danger{border-color:var(--signal-neg);color:var(--signal-neg)}
        .btn-sm.danger:hover{background:var(--signal-neg-bg)}
        .category-tabs{display:flex;gap:var(--space-2);margin-bottom:var(--space-6);flex-wrap:wrap}
        .cat-tab{padding:var(--space-2) var(--space-5);border-radius:var(--radius-sm);font-size:var(--text-sm);font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text-2);transition:background var(--ease-fast),color var(--ease-fast)}
        .cat-tab:hover{background:var(--card-hover)}
        .cat-tab.active{background:var(--brand);color:var(--text-inv);border-color:var(--brand)}
        .peer-selector{display:flex;gap:var(--space-2);margin-bottom:var(--space-5);flex-wrap:wrap}
        .peer-chip{padding:var(--space-2) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text-2);transition:background var(--ease-fast),color var(--ease-fast)}
        .peer-chip:hover{background:var(--card-hover)}
        .peer-chip.active{background:var(--brand);color:var(--text-inv);border-color:var(--brand)}

        /* ── Badges ── */
        .source-badge{display:inline-block;font-size:9px;font-weight:600;padding:1px var(--space-1);border-radius:var(--radius-full);vertical-align:middle;margin-left:var(--space-1);letter-spacing:.02em}
        .source-fb{background:var(--brand-subtle);color:var(--brand-text)}
        .source-sanren{background:var(--border-2);color:var(--text-2)}

        /* ── Comparison ── */
        .compare-slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--space-4);margin-bottom:var(--space-6)}
        .compare-slot{background:var(--card);border:2px dashed var(--border);border-radius:var(--radius-md);padding:var(--space-4);min-height:90px;display:flex;flex-direction:column;justify-content:center;position:relative;transition:border-color var(--ease-fast)}
        .compare-slot.filled{border-style:solid}
        .compare-slot .slot-name{font-family:var(--font-display);font-size:var(--text-base);font-weight:700}
        .compare-slot .slot-meta{font-size:var(--text-xs);color:var(--text-2);margin-top:2px}
        .compare-slot .slot-color{width:14px;height:14px;border-radius:var(--radius-sm);display:inline-block;margin-right:var(--space-2)}
        .compare-slot .slot-remove{position:absolute;top:var(--space-3);right:var(--space-3);background:none;border:none;cursor:pointer;font-size:var(--text-base);color:var(--text-3);transition:color var(--ease-fast)}
        .compare-slot .slot-remove:hover{color:var(--signal-neg)}
        .compare-slot .slot-add{text-align:center;color:var(--text-3);cursor:pointer;font-size:var(--text-sm);font-weight:500;transition:color var(--ease-fast)}
        .compare-slot .slot-add:hover{color:var(--brand)}
        .comp-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--space-4);margin-bottom:var(--space-8)}
        .comp-kpi-panel{background:var(--card);border-radius:var(--radius-md);padding:var(--space-5);border:1px solid var(--border);transition:background var(--ease-slow)}
        .comp-kpi-title{font-size:var(--text-sm);font-weight:700;color:var(--text-2);margin-bottom:var(--space-3)}

        /* ── Executive Summary ── */
        .exec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--space-4);margin-bottom:var(--space-8)}
        .exec-card{background:var(--card);border-radius:var(--radius-md);padding:var(--space-5);border:1px solid var(--border);transition:background var(--ease-fast),border-color var(--ease-fast)}
        .exec-card:hover{border-color:var(--border-strong)}
        .exec-card.strength{background:var(--signal-pos-bg)}
        .exec-card.caution{background:var(--signal-neg-bg)}
        .exec-card.neutral{background:var(--card)}
        .exec-cat{font-size:var(--text-xs);color:var(--text-2);font-weight:600;margin-bottom:var(--space-2)}
        .exec-val{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;line-height:var(--leading-data);margin-bottom:var(--space-2);letter-spacing:var(--tracking-tight)}
        .exec-rank{font-size:var(--text-xs);color:var(--text-2)}
        .exec-insight{background:var(--card);border-radius:var(--radius-md);padding:var(--space-5) var(--space-6);border:1px solid var(--border);margin-bottom:var(--space-8);font-size:var(--text-sm);line-height:1.8;color:var(--text-1)}

        /* ── IP Funnel ── */
        .funnel-bar{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3)}
        .funnel-label{width:100px;font-size:var(--text-sm);font-weight:600;text-align:right;color:var(--text-2);flex-shrink:0}
        .funnel-track{flex:1;height:28px;background:var(--border-2);border-radius:var(--radius-sm);position:relative;overflow:hidden}
        .funnel-fill{height:100%;border-radius:var(--radius-sm);transition:width .6s ease-out}
        .funnel-value{position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;color:var(--text-1)}
        .funnel-conv{font-size:var(--text-xs);color:var(--text-2);text-align:right;width:80px;flex-shrink:0}

        /* ── Command Palette ── */
        .cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:20vh;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
        .cmd-palette{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:520px;max-height:400px;overflow:hidden;box-shadow:var(--shadow-float)}
        .cmd-input{width:100%;padding:var(--space-4) var(--space-5);border:none;border-bottom:1px solid var(--border);font-size:var(--text-base);font-family:var(--font-body);background:transparent;color:var(--text-1);outline:none}
        .cmd-results{max-height:320px;overflow-y:auto}
        .cmd-item{padding:var(--space-3) var(--space-5);cursor:pointer;display:flex;align-items:center;gap:var(--space-3);transition:background var(--ease-fast)}
        .cmd-item:hover,.cmd-item.active{background:var(--brand-subtle)}
        .cmd-item-label{font-size:var(--text-sm);font-weight:500}
        .cmd-item-meta{font-size:var(--text-xs);color:var(--text-2)}
        .cmd-kbd{font-size:var(--text-xs);color:var(--text-3);background:var(--border-2);padding:2px var(--space-2);border-radius:var(--radius-sm);margin-left:auto}

        /* ── Terms Modal ── */
        .terms-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
        .terms-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:600px;max-width:calc(100vw - 32px);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-float);padding:var(--space-10) var(--space-8)}
        .terms-panel h2{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;letter-spacing:var(--tracking-tight);margin-bottom:var(--space-6)}
        .terms-section{margin-bottom:var(--space-5)}
        .terms-section h3{font-size:var(--text-sm);font-weight:700;color:var(--text-1);margin-bottom:var(--space-2);padding-bottom:var(--space-2);border-bottom:1px solid var(--border-2)}
        .terms-section p,.terms-section a{font-size:var(--text-sm);color:var(--text-2);line-height:1.8}
        .terms-section a{color:var(--brand);text-decoration:underline}
        .terms-close{position:sticky;top:0;float:right;background:var(--border-2);border:none;border-radius:var(--radius-full);width:32px;height:32px;cursor:pointer;font-size:var(--text-base);color:var(--text-2);display:flex;align-items:center;justify-content:center}
        .terms-close:hover{background:var(--border)}

        /* ══════════════════════════════════════════════════════════
           Landing Page
           ══════════════════════════════════════════════════════════ */
        .landing{min-height:100vh;display:flex;flex-direction:column;background:var(--surface)}
        .landing-nav{display:flex;align-items:center;justify-content:space-between;padding:var(--space-5) max(var(--space-12),8vw);width:100%;position:relative;z-index:2}
        .landing-logo{font-family:var(--font-display);font-size:var(--text-base);font-weight:700;color:rgba(255,255,255,.9)}
        .lp-hero{background:linear-gradient(160deg,#0C3B2A 0%,#061F16 100%);position:relative;overflow:hidden}
        .lp-hero-inner{display:flex;align-items:center;gap:var(--space-10);min-height:calc(100svh - 48px);padding:var(--space-10) max(var(--space-12),8vw);position:relative;z-index:1}
        .lp-hero-text{flex:1;text-align:left;max-width:480px}
        .lp-hero-preview{flex:1;position:relative;display:flex;align-items:center;justify-content:flex-end}
        .lp-hero-preview img{max-width:100%;border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.1);display:block}
        .lp-eyebrow{font-size:var(--text-xs);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:var(--space-5)}
        .lp-hero h1{font-family:var(--font-display);font-size:var(--text-3xl);font-weight:800;color:#fff;letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin-bottom:var(--space-4)}
        .lp-hero-sub{font-size:var(--text-base);color:rgba(255,255,255,.6);line-height:1.8;max-width:480px;margin:0 0 var(--space-8)}
        .lp-stats{display:flex;justify-content:center;gap:var(--space-12);margin-bottom:var(--space-10)}
        .lp-stat{text-align:center}
        .lp-stat-num{font-family:var(--font-display);font-size:var(--text-display);font-weight:800;color:#fff;letter-spacing:var(--tracking-tight);line-height:1}
        .lp-stat-label{font-size:var(--text-xs);color:rgba(255,255,255,.45);margin-top:var(--space-2);font-weight:500}
        .lp-cta{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-10);background:var(--cta);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:var(--text-base);font-weight:700;cursor:pointer;transition:background var(--ease-normal)}
        .lp-cta:hover{background:var(--cta-hover)}
        .lp-features-section{max-width:720px;margin:0 auto;padding:var(--space-12) var(--space-6)}
        .lp-features-heading{text-align:left;font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-6);color:var(--text-1)}
        .lp-features{display:flex;flex-direction:column;gap:var(--space-4)}
        .lp-fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-5) var(--space-6);transition:background var(--ease-fast),border-color var(--ease-fast);position:relative;overflow:hidden}
        .lp-fcard::before{display:none}
        .lp-fcard:hover{background:var(--card-hover);border-color:var(--border-strong)}
        .lp-fcard-header{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-2)}
        .lp-fcard-icon{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--brand-subtle);display:inline-flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0}
        .lp-fcard-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:700;color:var(--text-1)}
        .lp-fcard-desc{font-size:var(--text-sm);color:var(--text-2);line-height:1.7}
        .lp-trust{text-align:center;padding:var(--space-8) var(--space-6);font-size:var(--text-xs);color:var(--text-3);border-top:1px solid var(--border)}

        /* ── States ── */
        .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:var(--text-2);font-size:var(--text-sm)}
        .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:var(--space-4)}
        .error-banner{background:var(--signal-neg-bg);border:1px solid var(--signal-neg);color:var(--signal-neg);padding:var(--space-3) var(--space-5);border-radius:var(--radius-md);font-size:var(--text-sm);margin-bottom:var(--space-5)}
        .empty-state{text-align:center;padding:var(--space-12);color:var(--text-2);font-size:var(--text-sm)}
        .setup-box{max-width:500px;margin:80px auto;text-align:center}
        .setup-box h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;margin-bottom:var(--space-3);letter-spacing:var(--tracking-tight)}
        .setup-box p{color:var(--text-2);font-size:var(--text-sm);margin-bottom:var(--space-6)}
        .skeleton{background:linear-gradient(90deg,var(--border-2) 25%,var(--border) 50%,var(--border-2) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-md)}
        .skel-card{height:200px;border-radius:var(--radius-md)}
        .skel-chart{height:260px;border-radius:var(--radius-md)}
        .skel-text{height:16px;width:60%;margin-bottom:var(--space-2)}
        .skel-title{height:24px;width:40%;margin-bottom:var(--space-4)}
        .dashboard-footer{border-top:1px solid var(--border);padding:var(--space-5) var(--space-10);font-size:var(--text-xs);color:var(--text-3);line-height:1.8;transition:background var(--ease-slow),color var(--ease-slow)}
        .dashboard-footer a{color:var(--brand);text-decoration:none;font-weight:500}
        .print-header{display:none;text-align:center;margin-bottom:var(--space-4);font-family:var(--font-display);font-size:var(--text-lg);font-weight:700}
        .print-btn{padding:var(--space-2) var(--space-3);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;font-size:var(--text-xs);font-family:var(--font-body);color:var(--text-2);transition:background var(--ease-fast),color var(--ease-fast)}
        .print-btn:hover{background:var(--brand-subtle);color:var(--brand-text)}

        /* ── Responsive ── */
        @media(max-width:1023px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .sidebar-overlay.open{display:block}
            .main-content{margin-left:0!important}
        }
        @media(max-width:900px){.charts-row{grid-template-columns:1fr}}
        @media(max-width:767px){
            .content{padding:var(--space-4) var(--space-3) var(--space-8)}
            .page-header{padding:var(--space-3) var(--space-3)}
            .page-title{font-size:var(--text-lg)}
            .myuni-chip{font-size:var(--text-xs);padding:var(--space-1) var(--space-3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
            .breadcrumb span:first-child,.breadcrumb .breadcrumb-sep{display:none}
            .page-header .cmd-k-btn{display:none}
            .kpi-card{flex:0 1 calc(50% - 6px)}
            .kpi-card.kpi-primary{flex:0 1 100%}
            .chart-canvas-wrapper.trend{height:220px}
            .chart-canvas-wrapper.small{height:200px}
            .chart-canvas-wrapper.radar{height:280px}
            .lp-hero-inner{padding:var(--space-10) var(--space-5);min-height:auto;flex-direction:column}
            .lp-hero-preview{display:none}
            .lp-hero h1{font-size:var(--text-xl)}
            .lp-features-section{padding:var(--space-10) var(--space-5)}
            .lp-trust{padding:var(--space-6) var(--space-5)}
            .landing-nav{padding:var(--space-4) var(--space-5)}
            .landing{height:auto!important;min-height:100vh;overflow:auto!important}
            .filter-bar{gap:var(--space-2)}
            .filter-group{flex:1 1 calc(50% - 4px);min-width:0}
            .filter-group.search-wrapper{flex:1 1 100%}
            .category-tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;padding-bottom:var(--space-2);margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}
            .cat-tab{flex-shrink:0;scroll-snap-align:start}
            .terms-panel{padding:var(--space-6) var(--space-5)}
        }

        /* ── Print ── */
        @media print{
            .sidebar,.sidebar-overlay,.page-header,.filter-bar,.mobile-menu,.theme-toggle,.export-btn,.csv-btn,.pagination,.landing,.setup-box,.context-bar,.cat-tab:not(.active){display:none!important}
            .main-content{margin-left:0!important}.content{max-width:100%;padding:var(--space-4)}
            .kpi-grid{grid-template-columns:repeat(4,1fr)}.kpi-card{break-inside:avoid;border:1px solid #ddd}
            body,[data-theme="dark"]{background:#fff!important;color:#000!important}
            .chart-panel,.detail-panel,.table-panel,.exec-card,.exec-insight{border:1px solid #ddd}
            .print-header{display:block!important}
            @page{size:A4 landscape;margin:1cm}
        }
    </style>
</head>

<div id="root"></div>
<script type="text/babel">

Chart.defaults.font.family="'Outfit','Noto Sans JP',sans-serif";Chart.defaults.color='rgba(12,24,17,.54)';

function SmartSearch({onSelect,onSetMyUni,placeholder="大学名を入力...",showMyUniBtn=false,showSuggestions=true}){
    const[results,setResults]=useState([]);const[open,setOpen]=useState(false);const[query,setQuery]=useState("");const ref=useRef(null);const[sc,setSc]=useState({});
    const search=useCallback(async q=>{if(!q.trim()){setResults([]);return}try{const d=await api.universities({search:q,limit:8});setResults(d.universities||[])}catch{setResults([])}}, []);
    useEffect(()=>{if(!showSuggestions)return;const names=SUGGEST_GROUPS.flatMap(g=>g.names);Promise.all(names.map(n=>api.universities({search:n,limit:1}).then(d=>(d.universities||[])[0]).catch(()=>null))).then(unis=>{const c={};unis.forEach(u=>{if(u)c[u.name]=u});setSc(c)})},[showSuggestions]);
    const sel=(u,asMyUni)=>{
        // showMyUniBtnが有効なら、行クリックでもマイ大学に設定
        if((asMyUni||showMyUniBtn)&&onSetMyUni)onSetMyUni(u);

        setOpen(false);setResults([]);setQuery("");if(ref.current)ref.current.value="";
    };
    return(<div className="search-wrapper" style={{width:"100%"}}><input ref={ref} type="text" className="filter-input" style={{width:"100%"}} placeholder={placeholder} onChange={e=>{setQuery(e.target.value);setOpen(true);if(e.target.value)search(e.target.value);else setResults([])}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),250)}/>
        {open&&!query&&showSuggestions&&Object.keys(sc).length>0&&<div className="autocomplete-dropdown">{SUGGEST_GROUPS.map(g=>{const unis=g.names.map(n=>sc[n]).filter(Boolean);if(!unis.length)return null;return(<div key={g.label}><div className="ac-group-label">{g.label}</div>{unis.map(u=>(<div key={u.code} className="autocomplete-item" onMouseDown={e=>e.preventDefault()} onClick={()=>sel(u,false)}><div><div className="autocomplete-item-name">{u.name}</div><div className="autocomplete-item-meta">{u.type}/{u.prefecture}</div></div>{showMyUniBtn&&<button className="ac-btn primary" onClick={e=>{e.stopPropagation();sel(u,true)}}>★ マイ大学</button>}</div>))}</div>)})}</div>}
        {open&&query&&results.length>0&&<div className="autocomplete-dropdown">{results.map(u=>(<div key={u.code} className="autocomplete-item" onMouseDown={e=>e.preventDefault()} onClick={()=>sel(u,false)}><div><div className="autocomplete-item-name">{u.name}</div><div className="autocomplete-item-meta">{u.type}/{u.prefecture}</div></div><div style={{display:"flex",gap:6}}>{onSelect&&<button className="ac-btn" onClick={e=>{e.stopPropagation();sel(u,false)}}>選択</button>}{showMyUniBtn&&onSetMyUni&&<button className="ac-btn primary" onClick={e=>{e.stopPropagation();sel(u,true)}}>★ マイ大学</button>}</div></div>))}</div>}
    </div>);
}

function KPICard({label,value,change,sparkData,kpi,selected,onClick,rank,dataNote,avail,big,catColor,myUniValue,myUniRank,myUniName}){
    const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current||!sparkData||sparkData.length<2)return;if(inst.current)inst.current.destroy();
        const sparse=isSparse(avail);const dv=avail?nullify(sparkData,avail):sparkData;const tc=getThemeColors();
        const cc=catColor||tc.line;const ccMuted=catColor?(catColor+'33'):'#BCCCDC';
        inst.current=new Chart(cRef.current.getContext("2d"),{type:sparse?"scatter":"line",
            data:{labels:YL,datasets:[{data:sparse?dv.map((v,i)=>v!=null?{x:i,y:v}:null).filter(Boolean):dv,
                borderColor:selected?cc:ccMuted,backgroundColor:sparse?(selected?cc:ccMuted):tc.fill,
                borderWidth:sparse?0:2,fill:!sparse,tension:0,spanGaps:false,pointRadius:sparse?5:3,pointBackgroundColor:selected?cc:ccMuted,pointBorderColor:"transparent",showLine:!sparse}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false},tooltip:{enabled:true,callbacks:{title:i=>{const idx=sparse?i[0].raw?.x:i[0].dataIndex;return YLL[idx]||""},label:i=>fmtVal(sparse?i.raw?.y:i.raw,kpi)}}},
                scales:sparse?{x:{type:"linear",min:-.5,max:6.5,display:false},y:{display:false}}:{x:{display:false},y:{display:false}},animation:{duration:400}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[sparkData,selected,avail]);
    const signal=change==null?"":change>=5?"signal-up":change<=-5?"signal-down":"signal-flat";
    // P0-3: Enhanced trend arrow
    const trendIcon=change==null?"":change>=10?"↑↑":change>=5?"↑":change>-5?"→":change>-10?"↓":"↓↓";
    const cc=change>0?"positive":change<0?"negative":"neutral";
    return(<div className={`kpi-card ${selected?"selected":""} ${signal} ${big?"kpi-primary":""}`} onClick={onClick}>
        <div className="kpi-label">{label}</div>
        <div className="kpi-value">{fmtVal(value,kpi)}</div>
        {change!=null&&<span className={`kpi-change ${cc}`}><span className="trend-icon">{trendIcon}</span> {change>0?"+":""}{change.toFixed(1)}%</span>}
        {rank&&<><span className="kpi-rank">全国 {rank.rank}位 / {rank.total}機関</span>
            <div className="pbar">{[...Array(10)].map((_,i)=>{const pct=1-rank.rank/rank.total;const filled=i<Math.round(pct*10);const isTop=pct>=0.8;return<span key={i} className={`pbar-dot ${filled?"filled":""} ${filled&&isTop?"top":""}`}/>})}<span className="pbar-label">上位{Math.round((rank.rank/rank.total)*100)}%</span></div></>}
        {myUniName&&myUniValue!=null&&<div className="kpi-myuni">★ {myUniName}: {fmtVal(myUniValue,kpi)}{myUniRank?` (${myUniRank.rank}位/${myUniRank.total})`:""}</div>}
        {dataNote&&<span className="kpi-note">{dataNote}</span>}
        <div className="kpi-chart"><canvas ref={cRef}></canvas></div>
    </div>);
}

function IndexChart({uniData,natData,kpi,uniName,title,subtitle,avail}){

    useEffect(()=>{if(!cRef.current||!uniData||!natData||!kpi)return;if(inst.current)inst.current.destroy();
        const uVals=uniData[kpi]||[];const nVals=natData[kpi]||[];if(!uVals.length||!nVals.length)return;
        const a=avail?.[kpi];const uN=a?nullify(uVals,a):uVals;const nN=a?nullify(nVals,a):nVals;
        let baseU=null,baseN=null;for(let i=0;i<uN.length;i++){if(uN[i]!=null&&uN[i]>0){baseU=uN[i];break}}for(let i=0;i<nN.length;i++){if(nN[i]!=null&&nN[i]>0){baseN=nN[i];break}}
        if(!baseU||!baseN)return;const uIdx=uN.map(v=>v!=null?(v/baseU)*100:null);const nIdx=nN.map(v=>v!=null?(v/baseN)*100:null);const tc=getThemeColors();
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"line",data:{labels:YL,datasets:[
            {label:uniName,data:uIdx,borderColor:getToken('--brand'),backgroundColor:tc.fill,borderWidth:2.5,fill:true,tension:0,spanGaps:false,pointRadius:5,pointBackgroundColor:getToken('--brand'),pointBorderColor:tc.card,pointBorderWidth:2},
            {label:"全国平均",data:nIdx,borderColor:COMP_COLORS[1],backgroundColor:"transparent",borderWidth:2,borderDash:[6,3],tension:0,spanGaps:false,pointRadius:4,pointStyle:"triangle",pointBackgroundColor:COMP_COLORS[1],pointBorderColor:"transparent",fill:false}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:13,family:"'Noto Sans JP'"},usePointStyle:true,padding:16,color:tc.text}},datalabels:{display:false},tooltip:{callbacks:{title:i=>YLL[i[0].dataIndex],label:i=>{const raw=i.datasetIndex===0?uN[i.dataIndex]:nN[i.dataIndex];return`${i.dataset.label}: ${i.raw!=null?i.raw.toFixed(1)+"%":"-"} (${fmtVal(raw,kpi)})`}}}},
            scales:{y:{border:{display:false},grid:{color:tc.grid},ticks:{color:tc.text,font:{size:12},callback:v=>v+"%"},title:{display:true,text:"基準年=100%",font:{size:11},color:tc.text}},x:{border:{display:false},grid:{display:false},ticks:{color:tc.text,font:{size:12}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[uniData,natData,kpi]);

// CategoryPage
function CategoryPage({category,metadata,onSetMyUni,myUniversity,onNavigate}){
    const[selIdx,setSelIdx]=useState(0);const[natData,setNatData]=useState(null);const[btData,setBtData]=useState(null);

    const[promoDismissed,setPromoDismissed]=useState(()=>sessionStorage.getItem("myuni_promo_dismissed")==="1");
    const[filters,setFilters]=useState({type:"",prefecture:""});const[page,setPage]=useState(0);const[loading,setLoading]=useState(true);
    const[myUniData,setMyUniData]=useState(null);const[myUniRanks,setMyUniRanks]=useState(null);const[myUniCtx,setMyUniCtx]=useState(null);const[natAvgData,setNatAvgData]=useState(null);
    const kpis=CATEGORY_KPIS[category]||[];const selKpi=kpis[selIdx]||kpis[0];
    const isFiltered=!!(filters.type||filters.prefecture);const filterLabel=[filters.type,filters.prefecture].filter(Boolean).join(" / ")||"全大学";
    const avail=metadata?.data_availability;
    useEffect(()=>{setSelIdx(0);setPage(0)},[category]);
    useEffect(()=>{if(!metadata)return;setLoading(true);setFetchError(null);api.national(kpis,filters.type||undefined,filters.prefecture||undefined).then(r=>setNatData(r.data||{})).catch(()=>setFetchError("データの取得に失敗しました")).finally(()=>setLoading(false))},[category,metadata,filters,retryKey]);
    useEffect(()=>{if(!metadata||!selKpi)return;const btP=filters.type?Promise.resolve(null):api.byType([selKpi]).then(r=>r.data||{}).catch(()=>null);const rkP=api.ranking(selKpi,metadata.years.length-1,10,filters.type||undefined,filters.prefecture||undefined).then(r=>r.ranking||[]).catch(()=>[]);Promise.all([btP,rkP]).then(([bt,rk])=>{setBtData(bt);setRkData(rk)})},[selKpi,metadata,filters,retryKey]);
    useEffect(()=>{if(!metadata||!selKpi)return;api.universities({type:filters.type||undefined,prefecture:filters.prefecture||undefined,kpi:selKpi,sort:"desc",limit:50,offset:page*50}).then(d=>{setUnis(d.universities||[]);setTotalUnis(d.total_count||0)}).catch(()=>setFetchError("データの取得に失敗しました"))},[selKpi,filters,page,metadata,retryKey]);
    useEffect(()=>{if(!myUniversity||!metadata){setMyUniData(null);setMyUniRanks(null);setNatAvgData(null);return}
        Promise.all([api.university(myUniversity.code),api.universityRanks(myUniversity.code,kpis,metadata.years.length-1),api.national(kpis,filters.type||undefined,filters.prefecture||undefined,'avg')])
        .then(([u,r,a])=>{setMyUniData(u);setMyUniRanks(r.ranks||{});setNatAvgData(a.data||{})}).catch(()=>{setMyUniData(null);setMyUniRanks(null);setNatAvgData(null)})},[myUniversity,category,metadata,filters]);
    useEffect(()=>{if(!myUniversity||!metadata||!selKpi){setMyUniCtx(null);return}
        api.rankingContext(selKpi,myUniversity.code,metadata.years.length-1,5).then(setMyUniCtx).catch(()=>setMyUniCtx(null))},[selKpi,myUniversity,metadata]);
    const myUniKpis=myUniData?.kpis||{};
    const cards=kpis.map((k,i)=>{const v=natData?.[k]||[];const a=avail?.[k];const dv=a?nullify(v,a):v;return{kpi:k,label:kpiL(k,category),value:dv.reduce((l,x)=>x!=null?x:l,null),change:calcChg(v,a),sparkData:dv,dataNote:a?getDataNote(a):null,avail:a,
        myUniValue:myUniversity?(myUniKpis[k]||[]).reduce((l,x)=>x!=null?x:l,null):null,myUniRank:myUniRanks?.[k]||null,myUniName:myUniversity?.name||null}});
    // Prepare ranking data with myUniversity marker
    const rkDataWithMyUni=useMemo(()=>{if(!myUniversity||!rkData.length)return rkData;
        const inTop=rkData.some(d=>d.name===myUniversity.name);

        if(inTop)return marked;

// P0-1: Executive Summary
function ExecutiveSummary({myUniversity,metadata}){
    const[uniData,setUniData]=useState(null);const[allRanks,setAllRanks]=useState(null);const[loading,setLoading]=useState(true);const[fetchError,setFetchError]=useState(null);const[retryKey,setRetryKey]=useState(0);
    const primaryKpis=SIDEBAR_ITEMS.filter(s=>s!=="概要").map(s=>(CATEGORY_KPIS[s]||[])[0]).filter(Boolean);

    useEffect(()=>{if(!myUniversity||!metadata)return;setLoading(true);setFetchError(null);
        Promise.all([api.university(myUniversity.code),api.universityRanks(myUniversity.code,primaryKpis,metadata.years.length-1)])
        .then(([u,r])=>{setUniData(u);setAllRanks(r.ranks||{})}).catch(()=>setFetchError("データの取得に失敗しました")).finally(()=>setLoading(false))},[myUniversity,metadata,retryKey]);

    if(loading)return<div className="loading-state"><div className="spinner"></div></div>;
    if(fetchError)return<div className="error-banner">{fetchError} <span onClick={()=>setRetryKey(k=>k+1)} style={{cursor:"pointer",textDecoration:"underline",marginLeft:8}}>再読み込み</span></div>;
    const uniKpis=uniData?.kpis||{};
    // Determine strengths and cautions
    const items=SIDEBAR_ITEMS.filter(s=>s!=="概要").map(cat=>{const kpi=(CATEGORY_KPIS[cat]||[])[0];if(!kpi)return null;const vals=uniKpis[kpi]||[];const avail=metadata?.data_availability?.[kpi];const dv=avail?nullify(vals,avail):vals;const latest=dv.reduce((l,x)=>x!=null?x:l,null);const change=calcChg(vals,avail);const rank=allRanks?.[kpi];const pct=rank?(1-rank.rank/rank.total):0;return{cat,kpi,latest,change,rank,pct}}).filter(Boolean);
    const strengths=items.filter(i=>i.pct>=0.8).sort((a,b)=>b.pct-a.pct);
    const cautions=items.filter(i=>i.change!=null&&i.change<-5).sort((a,b)=>a.change-b.change);

    return(<div>
        {/* Insight text */}
        <div className="exec-insight">
            {strengths.length>0&&<span><strong>強み:</strong> {strengths.map(s=>`${s.cat}（上位${Math.round((1-s.pct)*100)}%）`).join("、")}。</span>}
            {cautions.length>0&&<span> <strong>要注意:</strong> {cautions.map(c=>`${c.cat}（前年比${c.change.toFixed(1)}%）`).join("、")}。</span>}
            {strengths.length===0&&cautions.length===0&&<span>各カテゴリのパフォーマンスを以下に表示しています。</span>}
        </div>
        {/* Score cards */}
        <div className="exec-grid">{items.map((item,idx)=>{const cls=item.pct>=0.8?"strength":item.change!=null&&item.change<-5?"caution":"neutral";
            const trendIcon=item.change==null?"":item.change>=10?"↑↑":item.change>=5?"↑":item.change>-5?"→":item.change>-10?"↓":"↓↓";
            const cc=item.change>0?"positive":item.change<0?"negative":"neutral";
            return(<div key={item.cat} className={`exec-card ${cls} anim-in`} style={{animationDelay:`${idx*0.05}s`}}>
                <div className="exec-cat">{item.cat}</div>
                <div className="exec-val">{fmtVal(item.latest,item.kpi)}</div>
                {item.change!=null&&<span className={`kpi-change ${cc}`} style={{marginBottom:6}}><span className="trend-icon">{trendIcon}</span> {item.change>0?"+":""}{item.change.toFixed(1)}%</span>}
                {item.rank&&<div className="exec-rank">{item.rank.rank}位 / {item.rank.total}機関</div>}
                {item.rank&&<div className="pbar" style={{marginTop:6}}>{[...Array(10)].map((_,i)=>{const filled=i<Math.round(item.pct*10);return<span key={i} className={`pbar-dot ${filled?"filled":""} ${filled&&item.pct>=0.8?"top":""}`}/>})}<span className="pbar-label">上位{Math.round((1-item.pct)*100+Number.EPSILON)}%</span></div>}
            </div>)})}</div>
    </div>);
}

// P1-4: 知財パイプライン
const IP_FUNNEL=[{label:"発明届出",kpi:"発明届出件数"},{label:"特許出願",kpi:"特許出願_国内"},{label:"特許保有",kpi:"特許保有_国内"},{label:"許諾中",kpi:"特許保有_国内_実施許諾中"},{label:"許諾権利数",kpi:"実施許諾_国内_権利数"},{label:"許諾収入",kpi:"実施許諾収入_国内"}];

function IPFunnelPage({myUniversity,metadata}){
    const[uniData,setUniData]=useState(null);const[natData,setNatData]=useState(null);const[loading,setLoading]=useState(true);const[fetchError,setFetchError]=useState(null);const[retryKey,setRetryKey]=useState(0);
    useEffect(()=>{if(!myUniversity||!metadata)return;setLoading(true);setFetchError(null);
        const kpis=IP_FUNNEL.map(f=>f.kpi);
        Promise.all([api.university(myUniversity.code),api.national(kpis)])
        .then(([u,n])=>{setUniData(u);setNatData(n.data||{})}).catch(()=>setFetchError("データの取得に失敗しました")).finally(()=>setLoading(false))},[myUniversity,metadata,retryKey]);

    if(!myUniversity)return<div className="empty-state">マイ大学を設定すると知財パイプラインが表示されます</div>;
    if(fetchError)return<div className="error-banner">{fetchError} <span onClick={()=>setRetryKey(k=>k+1)} style={{cursor:"pointer",textDecoration:"underline",marginLeft:8}}>再読み込み</span></div>;
    if(loading)return<div className="loading-state"><div className="spinner"></div></div>;
    const uk=uniData?.kpis||{};const yi=6;
    const items=IP_FUNNEL.map((f,i)=>{const v=(uk[f.kpi]||[])[yi];const nv=(natData[f.kpi]||[])[yi];return{...f,value:v,natValue:nv}});
    const maxVal=Math.max(...items.map(i=>i.value||0),1);
    // コンバージョン率
    const convs=items.slice(1).map((item,i)=>{const prev=items[i].value;return prev&&item.value!=null?((item.value/prev)*100).toFixed(1)+"%":"-"});

    return(<div>
        <div className="uni-banner anim-in"><div style={{display:"flex",alignItems:"baseline"}}><div className="uni-banner-name">{myUniversity.name}</div><div className="uni-banner-meta">{myUniversity.type} / {myUniversity.prefecture}</div></div></div>
        <div className="detail-panel anim-in">
            <div className="detail-title" style={{marginBottom:24}}>知財パイプライン（R6 最新年度）</div>
            <div style={{marginBottom:8,fontSize:12,color:"var(--text-3)"}}>※ 保有は累積ストック、他はフロー。段階間の比率は参考値です。</div>
            {items.map((item,i)=>{const pct=item.value!=null?Math.max((item.value/maxVal)*100,2):0;
                const colors=[getToken('--brand'),getToken('--signal-pos'),getToken('--chart-national'),getToken('--chart-public'),getToken('--brand-text'),getToken('--chart-private')];
                return(<div key={i} className="funnel-bar anim-in" style={{animationDelay:`${i*0.08}s`}}>
                    <div className="funnel-label">{item.label}</div>
                    <div className="funnel-track"><div className="funnel-fill" style={{width:`${pct}%`,background:colors[i]}}></div><div className="funnel-value">{isMoney(item.kpi)?fmtVal(item.value,item.kpi):item.value!=null?item.value.toLocaleString():"-"}</div></div>
                    <div className="funnel-conv">{i>0?convs[i-1]:""}</div>
                </div>)})}
        </div>
        {/* 7年推移 */}
        <div className="chart-panel full anim-in"><div className="chart-title">知財パイプライン 7年推移</div><div className="chart-subtitle">{myUniversity.name}</div>
            <IPFunnelTrend uniKpis={uk}/></div>
        {/* ピア比較 */}
        <div className="table-panel anim-in"><div className="table-toolbar"><div className="table-title">コンバージョン率 — {myUniversity.name} vs 全国平均</div></div>
            <table><thead><tr><th>段階</th><th className="numeric">{myUniversity.name}</th><th className="numeric">全国平均</th></tr></thead>
            <tbody>{items.slice(1).map((item,i)=>{const uConv=items[i].value&&item.value!=null?((item.value/items[i].value)*100).toFixed(1)+"%":"-";const nPrev=(natData[items[i].kpi]||[])[yi];const nCurr=(natData[item.kpi]||[])[yi];const nConv=nPrev&&nCurr?((nCurr/nPrev)*100).toFixed(1)+"%":"-";
                return<tr key={i}><td style={{fontWeight:600}}>{items[i].label}→{item.label}</td><td className="numeric">{uConv}</td><td className="numeric">{nConv}</td></tr>})}</tbody></table></div>
    </div>);
}

function IPFunnelTrend({uniKpis}){
    const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        const colors=[getToken('--brand'),getToken('--signal-pos'),getToken('--chart-national'),getToken('--chart-public'),getToken('--brand-text'),getToken('--chart-private')];
        const datasets=IP_FUNNEL.filter(f=>!isMoney(f.kpi)).map((f,i)=>({label:f.label,data:uniKpis[f.kpi]||[],borderColor:colors[i],backgroundColor:"transparent",borderWidth:2,tension:0,pointRadius:3,pointBackgroundColor:colors[i]}));
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"line",data:{labels:YL,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:12},usePointStyle:true,padding:12,color:tc.text}},datalabels:{display:false}},scales:{y:{beginAtZero:true,border:{display:false},grid:{color:tc.grid},ticks:{color:tc.text,font:{size:11}}},x:{border:{display:false},grid:{display:false},ticks:{color:tc.text,font:{size:12}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[uniKpis]);
    return(<div style={{height:260}}><canvas ref={cRef}></canvas></div>);
}

// P2-4: Command Palette
function CommandPalette({open,onClose,onNavigate,onSetMyUni,metadata}){
    const[query,setQuery]=useState("");const[results,setResults]=useState([]);const inputRef=useRef(null);
    useEffect(()=>{if(open&&inputRef.current){inputRef.current.focus();setQuery("");setResults([])}}, [open]);
    useEffect(()=>{if(!open)return;const handler=e=>{if(e.key==="Escape")onClose()};document.addEventListener("keydown",handler);return()=>document.removeEventListener("keydown",handler)},[open,onClose]);

    const search=async q=>{setQuery(q);if(!q.trim()){setResults([]);return}
        const cats=SIDEBAR_ITEMS.filter(s=>s.includes(q)).map(s=>({type:"nav",label:s,meta:"カテゴリ",action:()=>{onNavigate({type:"category",id:s});onClose()}}));
        const specials=[{match:"マイ大学",type:"nav",label:"マイ大学",meta:"マイ大学ページ",action:()=>{onNavigate({type:"my-university",id:null});onClose()}},{match:"比較",type:"nav",label:"大学比較",meta:"比較ページ",action:()=>{onNavigate({type:"comparison",id:null});onClose()}},{match:"知財",type:"nav",label:"知財パイプライン",meta:"マイ大学内",action:()=>{onNavigate({type:"my-university",id:null});onClose()}}].filter(s=>s.match.includes(q));
        let unis=[];try{const d=await api.universities({search:q,limit:5});unis=(d.universities||[]).map(u=>({type:"uni",label:u.name,meta:`${u.type}/${u.prefecture}`,action:()=>{onSetMyUni(u);onNavigate({type:"my-university",id:null});onClose()}}))}catch{}
        setResults([...cats,...specials,...unis]);
    };

    if(!open)return null;
    return(<div className="cmd-overlay" onClick={onClose}><div className="cmd-palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} className="cmd-input" placeholder="大学名、カテゴリ、機能を検索..." value={query} onChange={e=>search(e.target.value)}/>
        <div className="cmd-results">{results.length===0&&query?<div style={{padding:16,color:"var(--text-3)",textAlign:"center"}}>結果なし</div>:
            results.map((r,i)=><div key={i} className="cmd-item" onClick={r.action}><div><div className="cmd-item-label">{r.label}</div><div className="cmd-item-meta">{r.meta}</div></div></div>)}
        {!query&&<div style={{padding:16,color:"var(--text-3)",fontSize:13,textAlign:"center"}}>大学名・カテゴリ名を入力して検索</div>}
        </div></div></div>);
}

// ComparisonPage
function ComparisonPage({myUniversity,metadata}){
    const[slots,setSlots]=useState(()=>myUniversity?[myUniversity]:[]);const[cat,setCat]=useState("概要");const[compData,setCompData]=useState(null);const[searchSlot,setSearchSlot]=useState(null);
    const kpis=CATEGORY_KPIS[cat]||[];
    useEffect(()=>{if(myUniversity&&(slots.length===0||slots[0]?.code!==myUniversity.code)){setSlots(prev=>{const rest=prev.filter(s=>s.code!==myUniversity.code);return[myUniversity,...rest].slice(0,4)})}},[myUniversity]);
    useEffect(()=>{if(slots.length<1||!metadata){setCompData(null);return}api.multiUni(slots.map(s=>s.code),kpis,metadata.years.length-1).then(r=>setCompData(r.universities||[])).catch(()=>setCompData(null))},[slots,cat,metadata]);
    const addUni=u=>{if(slots.length>=4||slots.some(s=>s.code===u.code))return;setSlots([...slots,{code:u.code,name:u.name,type:u.type,prefecture:u.prefecture}]);setSearchSlot(null)};
    const removeUni=i=>setSlots(slots.filter((_,j)=>j!==i));
    return(<div>
        <div className="compare-slots">{[0,1,2,3].map(i=>{const s=slots[i];return(<div key={i} className={`compare-slot ${s?"filled":""}`} style={s?{borderColor:COMP_COLORS[i]}:{}}>
            {s?<><div style={{display:"flex",alignItems:"center"}}><span className="slot-color" style={{background:COMP_COLORS[i]}}></span><span className="slot-name">{s.name}</span></div><div className="slot-meta">{s.type}/{s.prefecture}</div>
            {(i>0||!myUniversity||s.code!==myUniversity.code)&&<button className="slot-remove" onClick={()=>removeUni(i)}>✕</button>}</>
            :searchSlot===i?<SmartSearch onSelect={addUni} placeholder="大学名..." showSuggestions={true}/>:<div className="slot-add" onClick={()=>setSearchSlot(i)}>+ 大学を追加</div>}</div>)})}</div>
        <div className="category-tabs" style={{marginBottom:28}}>
            {SIDEBAR_ITEMS.filter(s=>!["組織体制","外部資金"].includes(s)).map(s=><div key={s} className={`cat-tab ${cat===s?"active":""}`} onClick={()=>setCat(s)}>{s}</div>)}
            {["組織体制","外部資金"].map(s=><div key={s} className={`cat-tab ${cat===s?"active":""}`} onClick={()=>setCat(s)}>{s}</div>)}
        </div>
        {!compData||compData.length<2?<div className="empty-state">{slots.length<2?"比較するには2つ以上の大学を選択してください":"読み込み中..."}</div>:<>
            <RadarChart universities={compData} kpis={kpis} category={cat}/>
            <div className="comp-kpi-grid">{kpis.map(kpi=>{const vals=compData.map(u=>{const a=u.kpis?.[kpi]||[];return a.length?a[a.length-1]||0:0});return(<div key={kpi} className="comp-kpi-panel"><div className="comp-kpi-title">{kpiL(kpi,cat)}<SourceBadge kpi={kpi}/></div><CompMiniBar unis={compData} vals={vals} kpi={kpi}/></div>)})}</div>
            <CompTable universities={compData} kpis={kpis} category={cat}/>
        </>}
    </div>);
}

function CompMiniBar({unis,vals,kpi}){const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"bar",data:{labels:unis.map(u=>u.name.length>10?u.name.substring(0,10)+"…":u.name),datasets:[{data:vals,backgroundColor:unis.map((_,i)=>COMP_COLORS[i]),borderRadius:4,barThickness:18}]},
            options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},scales:{x:{beginAtZero:true,border:{display:false},grid:{color:tc.grid},ticks:{color:tc.text,font:{size:10},callback:yTick(kpi)}},y:{border:{display:false},grid:{display:false},ticks:{color:tc.text,font:{size:12}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[unis,vals,kpi]);
    return(<div style={{height:Math.max(70,unis.length*30)}}><canvas ref={cRef}></canvas></div>);
}

function RadarChart({universities,kpis,category}){const cRef=useRef(null),inst=useRef(null);
    useEffect(()=>{if(!cRef.current||!universities||universities.length<2)return;if(inst.current)inst.current.destroy();const tc=getThemeColors();
        const labels=kpis.map(k=>kpiL(k,category));
        const datasets=universities.map((u,i)=>({label:u.name,data:kpis.map(k=>u.percentiles?.[k]??0),backgroundColor:COMP_BG[i],borderColor:COMP_COLORS[i],borderWidth:2.5,pointRadius:5,pointStyle:COMP_MARKERS[i],pointBackgroundColor:COMP_COLORS[i]}));
        inst.current=new Chart(cRef.current.getContext("2d"),{type:"radar",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10},backdropColor:"transparent",color:tc.text},pointLabels:{font:{size:13,family:"'Noto Sans JP'"},color:tc.text},grid:{color:tc.grid}}},plugins:{legend:{position:"bottom",labels:{font:{size:13},usePointStyle:true,padding:16,color:tc.text}},datalabels:{display:false},tooltip:{callbacks:{label:item=>{const k=kpis[item.dataIndex];const uni=universities[item.datasetIndex];const a=uni.kpis?.[k];const latest=a?a[a.length-1]:null;return`${item.dataset.label}: ${item.raw.toFixed(1)}パーセンタイル (${fmtVal(latest,k)})`}}}}}});
        return()=>{if(inst.current){inst.current.destroy();inst.current=null}}},[universities,kpis,category]);
    return(<div className="chart-panel full"><div className="chart-title">KPI比較レーダーチャート</div><div className="chart-subtitle">パーセンタイル順位 — 外側ほど上位</div><div className="chart-canvas-wrapper radar"><canvas ref={cRef}></canvas></div></div>);
}

function CompTable({universities,kpis,category}){
    return(<div className="table-panel"><div className="table-toolbar"><div className="table-title">比較テーブル — {category}</div></div><table><thead><tr><th>KPI</th>{universities.map((u,i)=><th key={i}><span style={{display:"inline-block",width:12,height:12,borderRadius:3,background:COMP_COLORS[i],marginRight:6,verticalAlign:"middle"}}></span>{u.name.length>10?u.name.substring(0,10)+"…":u.name}</th>)}</tr></thead>
        <tbody>{kpis.map(k=>{const vals=universities.map(u=>{const a=u.kpis?.[k]||[];return a.length?a[a.length-1]:null});const maxV=Math.max(...vals.filter(v=>v!=null));
            return(<tr key={k}><td style={{fontWeight:600}}>{kpiL(k,category)}<SourceBadge kpi={k}/></td>{vals.map((v,i)=><td key={i} className={v!=null&&v===maxV&&maxV>0?"highlight numeric":"numeric"}>{fmtVal(v,k)}</td>)}</tr>)})}</tbody></table></div>);
}

// App
function App(){
    const[theme,setTheme]=useState(()=>localStorage.getItem("sangaku_theme")||"light");
    const[currentPage,setCurrentPage]=useState({type:"landing",id:null});
    const[metadata,setMetadata]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
    const[sidebarOpen,setSidebarOpen]=useState(false);
    const[sidebarCollapsed,setSidebarCollapsed]=useState(false);
    const[cmdOpen,setCmdOpen]=useState(false);const[termsOpen,setTermsOpen]=useState(false);
    const[myUniversity,setMyUniversity]=useState(()=>{try{const r=localStorage.getItem("sangaku_myUniversity");return r?JSON.parse(r):null}catch{return null}});

    useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("sangaku_theme",theme)},[theme]);
    // Sidebar uses unified --brand color from tokens (no per-category color switching)
    useEffect(()=>{if(myUniversity)localStorage.setItem("sangaku_myUniversity",JSON.stringify(myUniversity));else localStorage.removeItem("sangaku_myUniversity")},[myUniversity]);
    // P2-4: Cmd+K shortcut
    useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(true)}};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h)},[]);
    const toggleTheme=useCallback(()=>setTheme(t=>t==="dark"?"light":"dark"),[]);
    const handleSetMyUni=useCallback(u=>{if(!u)return;setMyUniversity({code:u.code,name:u.name,type:u.type,prefecture:u.prefecture})},[]);
    const handleClearMyUni=useCallback(()=>setMyUniversity(null),[]);

    useEffect(()=>{api.metadata().then(setMetadata).catch(e=>setError(e.message)).finally(()=>setLoading(false))},[]);

    // Landing Page
    if(currentPage.type==="landing")return<><LandingPage onEnter={()=>setCurrentPage({type:"category",id:"概要"})} theme={theme} onToggleTheme={toggleTheme} onTermsOpen={()=>setTermsOpen(true)}/><TermsModal open={termsOpen} onClose={()=>setTermsOpen(false)}/></>;

    if(loading&&!metadata)return(<div className="app"><Sidebar currentPage={currentPage} onChange={setCurrentPage} myUniversity={myUniversity} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)}/><div className="main-content"><div className="page-header"><div className="page-title">読み込み中...</div></div><div className="content"><div className="loading-state"><div className="spinner"></div></div></div></div></div>);

    const pageTitle=currentPage.type==="my-university"?"マイ大学":currentPage.type==="comparison"?"大学比較":currentPage.id;
    const pageMeta=currentPage.type==="my-university"?(myUniversity?myUniversity.name:"未設定"):currentPage.type==="comparison"?"最大4大学を比較":"H30–R6";

    return(<div className={`app ${sidebarCollapsed?"sidebar-collapsed":""}`}>
        <Sidebar currentPage={currentPage} onChange={setCurrentPage} myUniversity={myUniversity} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} collapsed={sidebarCollapsed} onToggleCollapse={()=>setSidebarCollapsed(!sidebarCollapsed)} onTermsOpen={()=>setTermsOpen(true)}/>
        <div className="main-content">
            <div className="page-header">
                <div className="page-header-left">
                    <button className="menu-btn" onClick={()=>setSidebarOpen(true)} style={{display:sidebarCollapsed||window.innerWidth<=1023?"flex":"none"}}><IC.menu size={20}/></button>
                    <nav className="breadcrumb" aria-label="breadcrumb">
                        <span style={{cursor:"pointer"}} onClick={()=>setCurrentPage({type:"category",id:"概要"})}>ダッシュボード</span>
                        <span className="breadcrumb-sep"><IC.chevronR size={14}/></span>
                        <span className="breadcrumb-current">{pageTitle}</span>
                    </nav>
                </div>
                <div className="page-header-right">
                    {myUniversity?<div className="myuni-chip" onClick={()=>setCurrentPage({type:"my-university",id:null})}>★ {myUniversity.name}</div>:<div className="myuni-chip myuni-chip-set" onClick={()=>setCurrentPage({type:"my-university",id:null})}>マイ大学を設定</div>}
                    <button className="theme-toggle" onClick={toggleTheme}>{theme==="dark"?<IC.sun size={18}/>:<IC.moon size={18}/>}</button>
                    <button className="theme-toggle cmd-k-btn" onClick={()=>setCmdOpen(true)} title="大学を検索（⌘K）"><IC.search size={18}/></button>
                </div>
            </div>
            <div className="print-header">{myUniversity?`${myUniversity.name} — 産連調査Viewer`:"産連調査Viewer"} ({new Date().toLocaleDateString("ja-JP")})</div>
            <CommandPalette open={cmdOpen} onClose={()=>setCmdOpen(false)} onNavigate={setCurrentPage} onSetMyUni={handleSetMyUni} metadata={metadata}/>
            <div className="content">{error&&<div className="error-banner">{error}</div>}
                {currentPage.type==="category"&&<CategoryPage key={currentPage.id} category={currentPage.id} metadata={metadata} onSetMyUni={handleSetMyUni} myUniversity={myUniversity} onNavigate={setCurrentPage}/>}
                {currentPage.type==="my-university"&&<MyUniversityPage myUniversity={myUniversity} metadata={metadata} onSetMyUni={handleSetMyUni} onClear={handleClearMyUni}/>}
                {currentPage.type==="comparison"&&<ComparisonPage myUniversity={myUniversity} metadata={metadata}/>}
                {currentPage.type==="ip-funnel"&&(()=>{setCurrentPage({type:"my-university",id:null});return null})()}
            </div>
            <Footer onTermsOpen={()=>setTermsOpen(true)}/>
            <TermsModal open={termsOpen} onClose={()=>setTermsOpen(false)}/>
        </div>
    </div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
